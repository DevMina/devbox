<script>(function(){var k='devbox_theme',t=localStorage.getItem(k)||'dark';document.documentElement.setAttribute('data-theme',t);function a(th){document.documentElement.setAttribute('data-theme',th);localStorage.setItem(k,th);document.querySelectorAll('.theme-toggle').forEach(function(b){var i=b.querySelector('.theme-toggle-icon'),l=b.querySelector('.theme-toggle-label');if(i)i.textContent=th==='light'?'🌙':'☀️';if(l)l.textContent=th==='light'?'Dark mode':'Light mode';});}window.toggleTheme=function(){a(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');};window.applyTheme=a;})();</script>
<style id="critical-css">
/* ════════════════════════════════════════════
   DevBox — Shared Design System
   ════════════════════════════════════════════ */

/* ── CSS Custom Properties ── */
:root {
  /* Background layers */
  --bg:       #0A0C10;
  --panel:    #0F1117;
  --surface:  #161B24;
  --surface2: #1C2330;

  /* Borders */
  --border:  #252D3D;
  --border2: #2E3A50;

  /* Text */
  --text:        #CDD6F0;
  --text-dim:    #7A8AAD;
  --text-bright: #EEF2FF;

  /* Accent palette */
  --green:       #3DFFA0;  --green-dim:  rgba(61,255,160,0.09);
  --blue:        #5BA4FF;  --blue-dim:   rgba(91,164,255,0.09);
  --orange:      #FF9A3C;  --orange-dim: rgba(255,154,60,0.09);
  --purple:      #B07EFF;  --purple-dim: rgba(176,126,255,0.09);
  --red:         #FF5E7A;  --red-dim:    rgba(255,94,122,0.09);
  --cyan:        #22D9F0;  --cyan-dim:   rgba(34,217,240,0.09);
  --yellow:      #FFD166;  --yellow-dim: rgba(255,209,102,0.09);
  --pink:        #FF79C6;  --pink-dim:   rgba(255,121,198,0.09);
  --teal:        #1EE8B8;  --teal-dim:   rgba(30,232,184,0.09);

  /* Typography */
  --font: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', 'Fira Code', monospace;

  /* Radii */
  --r:    10px;
  --r-sm:  6px;
  --r-xs:  4px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.45);

  /* Transitions */
  --transition: 0.15s ease;
  --transition-slow: 0.25s ease;

  /* Sidebar width */
  --sidebar-w: 228px;
  --sidebar-collapsed-w: 58px;
}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.app{display:flex;flex:1;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;}
[data-theme="light"] {
  --bg:       #F5F7FA;
  --panel:    #FFFFFF;
  --surface:  #EAEDF2;
  --surface2: #DDE1EA;

  --border:  #D1D7E3;
  --border2: #B8C0D2;

  --text:        #2D3452;
  --text-dim:    #566080;
  --text-bright: #111827;

  --green:       #006B43;  --green-dim:  rgba(0,168,107,0.1);
  --blue:        #2B6CB0;  --blue-dim:   rgba(43,108,176,0.1);
  --orange:      #9A4218;  --orange-dim: rgba(192,86,33,0.1);
  --purple:      #6B46C1;  --purple-dim: rgba(107,70,193,0.1);
  --red:         #C53030;  --red-dim:    rgba(197,48,48,0.1);
  --cyan:        #066678;  --cyan-dim:   rgba(9,135,160,0.1);
  --yellow:      #8A5A15;  --yellow-dim: rgba(183,121,31,0.1);
  --pink:        #97266D;  --pink-dim:   rgba(151,38,109,0.1);
  --teal:        #285E61;  --teal-dim:   rgba(40,94,97,0.1);
}
</style>
<meta name="description" content="DevBox — Focus timer with work sessions and breaks">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer — DevBox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"></noscript>
<link rel="preload" href="../assets/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="../assets/style.css"></noscript>
<meta property="og:title" content="Pomodoro Timer — DevBox">
<meta property="og:description" content="Focus timer with work sessions and breaks">
<meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--red-dim);color:var(--red)">🍅</div>
                    <div>
                        <div class="tool-title">Pomodoro Timer</div>
                        <div class="tool-desc">Focus timer with work sessions, breaks, and session tracking</div>
                    </div>
                </div>

                <div style="max-width:420px;margin:0 auto">
                    <div class="panel" style="text-align:center;padding:32px 24px">
                        <div id="pomMode" style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-dim);margin-bottom:16px">WORK SESSION</div>
                        <div id="pomDisplay" style="font-family:var(--mono);font-size:5rem;font-weight:600;color:var(--text-bright);letter-spacing:-0.04em;line-height:1">25:00</div>
                        <div id="pomSession" style="font-size:0.78rem;color:var(--text-dim);margin-top:12px">Session 1 of 4</div>
                        <div style="margin-top:24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
                            <button class="btn btn-red" id="pomStartBtn" onclick="pomToggle()" style="padding:12px 28px;font-size:0.9rem">▶ Start</button>
                            <button class="btn btn-ghost" onclick="pomReset()" style="padding:12px 20px">↺ Reset</button>
                            <button class="btn btn-ghost" onclick="pomSkip()" style="padding:12px 20px">Skip →</button>
                        </div>
                    </div>
                    <div class="panel" style="margin-top:14px">
                        <div class="panel-bar"><span class="panel-label">Settings</span></div>
                        <div class="input-row"><label>Work (min)</label><input type="number" id="pomWork" value="25" min="1" max="60" style="width:80px;flex:none" onchange="pomReset()"></div>
                        <div class="input-row"><label>Short break</label><input type="number" id="pomShort" value="5" min="1" max="30" style="width:80px;flex:none" onchange="pomReset()"></div>
                        <div class="input-row"><label>Long break</label><input type="number" id="pomLong" value="15" min="1" max="60" style="width:80px;flex:none" onchange="pomReset()"></div>
                        <div class="input-row" style="border-bottom:none"><label>Sessions</label><input type="number" id="pomSessions" value="4" min="1" max="12" style="width:80px;flex:none" onchange="pomReset()"></div>
                    </div>
                    <div class="panel" style="margin-top:14px">
                        <div class="panel-bar"><span class="panel-label">Today's stats</span></div>
                        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0">
                            <div style="padding:14px 16px;text-align:center;border-right:1px solid var(--border)">
                                <div style="font-family:var(--mono);font-size:1.6rem;font-weight:600;color:var(--red)" id="statPomos">0</div>
                                <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-dim);margin-top:4px">Pomodoros</div>
                            </div>
                            <div style="padding:14px 16px;text-align:center;border-right:1px solid var(--border)">
                                <div style="font-family:var(--mono);font-size:1.6rem;font-weight:600;color:var(--green)" id="statFocus">0m</div>
                                <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-dim);margin-top:4px">Focus time</div>
                            </div>
                            <div style="padding:14px 16px;text-align:center">
                                <div style="font-family:var(--mono);font-size:1.6rem;font-weight:600;color:var(--blue)" id="statBreaks">0</div>
                                <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-dim);margin-top:4px">Breaks</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
        <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
        <script src="../assets/sidebar.js" defer></script>
        <script>
            let pomTimer = null, pomSeconds = 25 * 60, pomPhase = 'work', pomSessionNum = 1, pomRunning = false;
            let statPomos = 0, statFocus = 0, statBreaks = 0;
            function pomGetWork() { return parseInt(document.getElementById('pomWork').value) * 60; }
            function pomGetShort() { return parseInt(document.getElementById('pomShort').value) * 60; }
            function pomGetLong() { return parseInt(document.getElementById('pomLong').value) * 60; }
            function pomGetSessions() { return parseInt(document.getElementById('pomSessions').value); }
            function pomFmt(s) { return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`; }
            function pomUpdateDisplay() {
                document.getElementById('pomDisplay').textContent = pomFmt(pomSeconds);
                document.title = pomFmt(pomSeconds) + ' — ' + pomPhase + ' | DevBox';
                document.getElementById('pomMode').textContent = pomPhase === 'work' ? 'WORK SESSION' : pomPhase === 'short' ? 'SHORT BREAK' : 'LONG BREAK';
                document.getElementById('pomSession').textContent = `Session ${pomSessionNum} of ${pomGetSessions()}`;
                document.getElementById('statPomos').textContent = statPomos;
                document.getElementById('statFocus').textContent = Math.round(statFocus / 60) + 'm';
                document.getElementById('statBreaks').textContent = statBreaks;
            }
            function pomToggle() {
                if (pomRunning) { clearInterval(pomTimer); pomRunning = false; document.getElementById('pomStartBtn').textContent = '▶ Start'; }
                else {
                    pomRunning = true; document.getElementById('pomStartBtn').textContent = '⏸ Pause';
                    pomTimer = setInterval(() => {
                        pomSeconds--;
                        if (pomPhase === 'work') statFocus++;
                        if (pomSeconds <= 0) { pomAdvance(); }
                        pomUpdateDisplay();
                    }, 1000);
                }
            }
            function pomAdvance() {
                clearInterval(pomTimer); pomRunning = false; document.getElementById('pomStartBtn').textContent = '▶ Start';
                if (pomPhase === 'work') {
                    statPomos++;
                    if (pomSessionNum >= pomGetSessions()) { pomPhase = 'long'; pomSeconds = pomGetLong(); pomSessionNum = 1; }
                    else { pomPhase = 'short'; pomSeconds = pomGetShort(); pomSessionNum++; }
                    statBreaks++;
                } else { pomPhase = 'work'; pomSeconds = pomGetWork(); }
                try { new Notification('DevBox Pomodoro', { body: pomPhase === 'work' ? 'Break over — time to focus!' : 'Session complete — take a break!' }); } catch (e) { }
                pomUpdateDisplay(); showToast(pomPhase === 'work' ? 'Break time! 🌿' : 'Focus time! 🍅');
            }
            function pomReset() { clearInterval(pomTimer); pomRunning = false; pomPhase = 'work'; pomSessionNum = 1; pomSeconds = pomGetWork(); document.getElementById('pomStartBtn').textContent = '▶ Start'; document.title = 'Pomodoro Timer | DevBox'; pomUpdateDisplay(); }
            function pomSkip() { clearInterval(pomTimer); pomRunning = false; pomSeconds = 0; pomAdvance(); }
            document.addEventListener('DOMContentLoaded', () => { if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission(); pomUpdateDisplay(); });
        </script>
</body>
</html>
