<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>(function(){var k='devbox_theme',t=localStorage.getItem(k)||'dark';document.documentElement.setAttribute('data-theme',t);function a(th){document.documentElement.setAttribute('data-theme',th);localStorage.setItem(k,th);document.querySelectorAll('.theme-toggle').forEach(function(b){var i=b.querySelector('.theme-toggle-icon'),l=b.querySelector('.theme-toggle-label');if(i)i.textContent=th==='light'?'🌙':'☀️';if(l)l.textContent=th==='light'?'Dark mode':'Light mode';});}window.toggleTheme=function(){a(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');};window.applyTheme=a;})();</script>
<meta name="description" content="DevBox — Analyze text for word count, reading time, and frequency">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Stats — DevBox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"></noscript>
<link rel="stylesheet" href="../assets/style.css">
<meta property="og:title" content="Text Stats — DevBox">
<meta property="og:description" content="Analyze text for word count, reading time, and frequency">
<meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--blue-dim);color:var(--blue)">Aa</div>
                    <div>
                        <div class="tool-title">Text Stats</div>
                        <div class="tool-desc">Analyze text: word count, reading time, frequency</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar"><span class="panel-label">Input</span><div class="panel-actions"><button class="btn btn-ghost" onclick="document.getElementById('tsxtInput').value='';updateTextStats()">Clear</button></div></div>
                    <textarea id="tsxtInput" placeholder="Paste any text to analyze…" oninput="updateTextStats()" style="min-height:160px"></textarea>
                </div>
                <div class="four-col" style="margin-bottom:14px">
                    <div class="panel" style="margin:0;padding:14px 16px"><div style="font-family:var(--mono);font-size:1.5rem;font-weight:600;color:var(--blue)" id="tsxt-chars">0</div><div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-dim);margin-top:4px">Characters</div></div>
                    <div class="panel" style="margin:0;padding:14px 16px"><div style="font-family:var(--mono);font-size:1.5rem;font-weight:600;color:var(--green)" id="tsxt-words">0</div><div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-dim);margin-top:4px">Words</div></div>
                    <div class="panel" style="margin:0;padding:14px 16px"><div style="font-family:var(--mono);font-size:1.5rem;font-weight:600;color:var(--orange)" id="tsxt-sentences">0</div><div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-dim);margin-top:4px">Sentences</div></div>
                    <div class="panel" style="margin:0;padding:14px 16px"><div style="font-family:var(--mono);font-size:1.5rem;font-weight:600;color:var(--purple)" id="tsxt-read">0s</div><div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-dim);margin-top:4px">Read time</div></div>
                </div>
                <div class="two-col">
                    <div class="panel"><div class="panel-bar"><span class="panel-label">Top words</span></div><div id="tsxt-topwords" class="output-area" style="min-height:120px;font-size:0.8rem;"></div></div>
                    <div class="panel"><div class="panel-bar"><span class="panel-label">More stats</span></div><div id="tsxt-more" class="output-area" style="min-height:120px;font-size:0.8rem;"></div></div>
                </div>
            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
        <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
        <script src="../assets/sidebar.js" defer></script>
        <script>
            function updateTextStats() {
                const txt = document.getElementById('tsxtInput').value, chars = txt.length, charsNoSpace = txt.replace(/\s/g, '').length, words = txt.trim() ? txt.trim().split(/\s+/).length : 0, sentences = txt.trim() ? (txt.match(/[.!?]+/g) || []).length : 0, lines = txt ? txt.split('\n').length : 0, readSec = Math.ceil(words / 238 * 60), readStr = readSec < 60 ? readSec + 's' : Math.ceil(readSec / 60) + 'm';
                document.getElementById('tsxt-chars').textContent = chars.toLocaleString(); document.getElementById('tsxt-words').textContent = words.toLocaleString(); document.getElementById('tsxt-sentences').textContent = sentences.toLocaleString(); document.getElementById('tsxt-read').textContent = words ? readStr : '0s';
                const wordMap = {}; txt.toLowerCase().match(/\b[a-z]{3,}\b/g)?.forEach(w => { wordMap[w] = (wordMap[w] || 0) + 1; }); const topWords = Object.entries(wordMap).sort((a, b) => b[1] - a[1]).slice(0, 10);
                document.getElementById('tsxt-topwords').innerHTML = topWords.length ? topWords.map(([w, c]) => `<span style="color:var(--blue)">${w}</span><span style="color:var(--text-dim);float:right">${c}×</span><br>`).join('') : '<span style="color:var(--text-dim)">No words yet.</span>';
                document.getElementById('tsxt-more').innerHTML = `<span style="color:var(--text-dim)">Chars (no spaces):</span> <span style="color:var(--text)">${charsNoSpace}</span><br><span style="color:var(--text-dim)">Lines:</span> <span style="color:var(--text)">${lines}</span><br><span style="color:var(--text-dim)">Paragraphs:</span> <span style="color:var(--text)">${txt.split(/\n\s*\n/).filter(p => p.trim()).length}</span><br><span style="color:var(--text-dim)">Avg word length:</span> <span style="color:var(--text)">${words ? (charsNoSpace / words).toFixed(1) : '—'}</span><br><span style="color:var(--text-dim)">Longest word:</span> <span style="color:var(--orange)">${(txt.match(/\b[a-zA-Z]+\b/g) || ['']).sort((a, b) => b.length - a.length)[0] || '—'}</span><br><span style="color:var(--text-dim)">Unique words:</span> <span style="color:var(--text)">${Object.keys(wordMap).length}</span>`;
            }
        </script>
</body>
</html>
