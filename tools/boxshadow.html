<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>(function(){var k='devbox_theme',t=localStorage.getItem(k)||'dark';document.documentElement.setAttribute('data-theme',t);function a(th){document.documentElement.setAttribute('data-theme',th);localStorage.setItem(k,th);document.querySelectorAll('.theme-toggle').forEach(function(b){var i=b.querySelector('.theme-toggle-icon'),l=b.querySelector('.theme-toggle-label');if(i)i.textContent=th==='light'?'🌙':'☀️';if(l)l.textContent=th==='light'?'Dark mode':'Light mode';});}window.toggleTheme=function(){a(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');};window.applyTheme=a;})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Shadow Builder — DevBox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"></noscript>
<link rel="stylesheet" href="../assets/style.css">
<style>
.builder-layout{display:grid;grid-template-columns:320px 1fr;gap:16px}
@media(max-width:700px){.builder-layout{grid-template-columns:1fr}}
.preview-area{background:repeating-conic-gradient(var(--surface2) 0% 25%,var(--surface) 0% 50%) 0 0/20px 20px;border-radius:var(--r);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;min-height:280px}
.preview-box{width:100px;height:100px;background:var(--panel);border-radius:8px;transition:box-shadow 0.15s}
.ctrl-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.ctrl-label{display:flex;justify-content:space-between;font-family:var(--mono);font-size:0.72rem;color:var(--text-dim)}
.ctrl-label span{color:var(--text)}
.ctrl-row input[type=range]{width:100%;accent-color:var(--pink)}
.ctrl-row input[type=color]{width:44px;height:30px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:none;padding:2px}
.shadow-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.shadow-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;transition:border-color var(--transition)}
.shadow-item.active{border-color:var(--pink)}
.shadow-swatch{width:20px;height:20px;border-radius:4px;border:1px solid var(--border);flex-shrink:0}
.shadow-label{font-family:var(--mono);font-size:0.72rem;color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.shadow-del{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:0.9rem;padding:2px 4px;transition:color var(--transition)}
.shadow-del:hover{color:var(--red)}
#output{color:var(--pink);font-family:var(--mono);font-size:0.85rem;word-break:break-all}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content-wrap">
    <div class="content">
      <div class="tool-header">
        <div class="tool-icon" style="background:var(--pink-dim);color:var(--pink)">□</div>
        <div><div class="tool-title">Box Shadow Builder</div><div class="tool-desc">Visual CSS box-shadow editor with multiple layers</div></div>
      </div>
      <div class="builder-layout">
        <!-- Controls -->
        <div>
          <div class="panel" style="margin-bottom:10px">
            <div class="panel-bar">
              <span class="panel-label">Layers</span>
              <div class="panel-actions">
                <button class="btn btn-pink" onclick="addLayer()">+ Add Layer</button>
              </div>
            </div>
            <div class="shadow-list" id="shadowList"></div>
          </div>
          <div class="panel">
            <div class="panel-bar"><span class="panel-label">Layer Settings</span></div>
            <div class="ctrl-row">
              <div class="ctrl-label"><span>X Offset</span><span id="vX">0px</span></div>
              <input type="range" id="rX" min="-50" max="50" value="0" oninput="sliderUpdate()">
            </div>
            <div class="ctrl-row">
              <div class="ctrl-label"><span>Y Offset</span><span id="vY">4px</span></div>
              <input type="range" id="rY" min="-50" max="50" value="4" oninput="sliderUpdate()">
            </div>
            <div class="ctrl-row">
              <div class="ctrl-label"><span>Blur</span><span id="vB">8px</span></div>
              <input type="range" id="rB" min="0" max="100" value="8" oninput="sliderUpdate()">
            </div>
            <div class="ctrl-row">
              <div class="ctrl-label"><span>Spread</span><span id="vS">0px</span></div>
              <input type="range" id="rS" min="-50" max="50" value="0" oninput="sliderUpdate()">
            </div>
            <div class="ctrl-row">
              <div class="ctrl-label"><span>Opacity</span><span id="vO">40%</span></div>
              <input type="range" id="rO" min="0" max="100" value="40" oninput="sliderUpdate()">
            </div>
            <div class="ctrl-row" style="flex-direction:row;align-items:center;gap:10px">
              <span style="font-family:var(--mono);font-size:0.72rem;color:var(--text-dim)">Color</span>
              <input type="color" id="rC" value="#000000" oninput="sliderUpdate()">
              <label style="font-family:var(--mono);font-size:0.72rem;color:var(--text-dim);display:flex;align-items:center;gap:5px">
                <input type="checkbox" id="rInset" onchange="sliderUpdate()" style="accent-color:var(--pink)"> Inset
              </label>
            </div>
          </div>
        </div>
        <!-- Preview -->
        <div style="display:flex;flex-direction:column;gap:12px">
          <div class="preview-area">
            <div class="preview-box" id="previewBox"></div>
          </div>
          <div class="panel" style="margin:0">
            <div class="panel-bar">
              <span class="panel-label">CSS Output</span>
              <div class="panel-actions">
                <button class="btn btn-ghost" onclick="copy()">⎘ Copy</button>
                <button class="btn btn-ghost" onclick="reset()">Reset</button>
              </div>
            </div>
            <div id="output" class="output-area"></div>
          </div>
        </div>
      </div>
    </div>
    <footer class="site-footer">© 2026 Mina Abdo. All rights reserved.</footer>
  </main>
</div>
<div class="toast" id="toast"></div>
<script src="../assets/shared.js" defer></script>
<script src="../assets/sidebar.js" defer></script>
<script>
let layers = [{ x:0,y:4,blur:8,spread:0,opacity:40,color:'#000000',inset:false }];
let activeIdx = 0;

function hexToRgb(hex){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b};}
function layerToCSS(l){
  const {r,g,b}=hexToRgb(l.color);
  return `${l.inset?'inset ':''} ${l.x}px ${l.y}px ${l.blur}px ${l.spread}px rgba(${r},${g},${b},${(l.opacity/100).toFixed(2)})`.trim();
}

function render() {
  const css = layers.map(layerToCSS).join(',\n         ');
  document.getElementById('previewBox').style.boxShadow = layers.map(layerToCSS).join(',');
  document.getElementById('output').textContent = `box-shadow: ${css};`;
  // List
  document.getElementById('shadowList').innerHTML = layers.map((l,i) => {
    const {r,g,b}=hexToRgb(l.color);
    return `<div class="shadow-item${i===activeIdx?' active':''}" onclick="selectLayer(${i})">
      <div class="shadow-swatch" style="background:rgba(${r},${g},${b},${l.opacity/100})"></div>
      <span class="shadow-label">${l.inset?'inset ':''} ${l.x}px ${l.y}px ${l.blur}px ${l.spread}px</span>
      <button class="shadow-del" onclick="event.stopPropagation();deleteLayer(${i})">✕</button>
    </div>`;
  }).join('');
}

function loadLayer(i) {
  const l = layers[i];
  document.getElementById('rX').value = l.x;    document.getElementById('vX').textContent = l.x+'px';
  document.getElementById('rY').value = l.y;    document.getElementById('vY').textContent = l.y+'px';
  document.getElementById('rB').value = l.blur; document.getElementById('vB').textContent = l.blur+'px';
  document.getElementById('rS').value = l.spread;document.getElementById('vS').textContent = l.spread+'px';
  document.getElementById('rO').value = l.opacity;document.getElementById('vO').textContent = l.opacity+'%';
  document.getElementById('rC').value = l.color;
  document.getElementById('rInset').checked = l.inset;
}

function selectLayer(i){ activeIdx=i; loadLayer(i); render(); }

function sliderUpdate(){
  layers[activeIdx]={
    x:+document.getElementById('rX').value,
    y:+document.getElementById('rY').value,
    blur:+document.getElementById('rB').value,
    spread:+document.getElementById('rS').value,
    opacity:+document.getElementById('rO').value,
    color:document.getElementById('rC').value,
    inset:document.getElementById('rInset').checked,
  };
  document.getElementById('vX').textContent=layers[activeIdx].x+'px';
  document.getElementById('vY').textContent=layers[activeIdx].y+'px';
  document.getElementById('vB').textContent=layers[activeIdx].blur+'px';
  document.getElementById('vS').textContent=layers[activeIdx].spread+'px';
  document.getElementById('vO').textContent=layers[activeIdx].opacity+'%';
  render();
}

function addLayer(){ layers.push({x:2,y:2,blur:6,spread:0,opacity:25,color:'#000000',inset:false}); activeIdx=layers.length-1; loadLayer(activeIdx); render(); }
function deleteLayer(i){ if(layers.length===1){showToast('Need at least one layer');return;} layers.splice(i,1); activeIdx=Math.min(activeIdx,layers.length-1); loadLayer(activeIdx); render(); }
function reset(){ layers=[{x:0,y:4,blur:8,spread:0,opacity:40,color:'#000000',inset:false}]; activeIdx=0; loadLayer(0); render(); }
function copy(){ const t=document.getElementById('output').textContent; navigator.clipboard.writeText(t).then(()=>showToast('Copied!')); }
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}

loadLayer(0); render();
</script>
</body>
</html>
