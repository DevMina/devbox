/* ── CSS Custom Properties ── */

  /* Background layers */
  --bg:       #0A0C10;

  --surface:  #161B24;
  --surface2: #1C2330;

  /* Borders */

  /* Text */
  --text:        #CDD6F0;

  /* Accent palette */
  --green:       #3DFFA0;  --green-dim:  rgba(61,255,160,0.09);
  --blue:        #5BA4FF;  --blue-dim:   rgba(91,164,255,0.09);
  --orange:      #FF9A3C;  --orange-dim: rgba(255,154,60,0.09);
  --purple:      #B07EFF;  --purple-dim: rgba(176,126,255,0.09);
  --red:         #FF5E7A;  --red-dim:    rgba(255,94,122,0.09);
  --cyan:        #22D9F0;  --cyan-dim:   rgba(34,217,240,0.09);
  --yellow:      #FFD166;  --yellow-dim: rgba(255,209,102,0.09);
  --pink:        #FF79C6;  --pink-dim:   rgba(255,121,198,0.09);
  --teal:        #1EE8B8;  --teal-dim:   rgba(30,232,184,0.09);

  /* Typography */
  --font: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', 'Fira Code', monospace;

  /* Radii */
  --r:    10px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.45);

  /* Transitions */
  --transition: 0.15s ease;

  /* Sidebar width */
  --sidebar-w: 228px;

}

    <div class="app">

        <script>
            function hexToRgb(hex) { hex = hex.replace(/^#/, ''); if (hex.length === 3) hex = hex.split('').map(c => c + c).join(''); const n = parseInt(hex, 16); return [n >> 16 & 255, n >> 8 & 255, n & 255]; }
            function rgbToHsl(r, g, b) { r /= 255; g /= 255; b /= 255; const max = Math.max(r, g, b), min = Math.min(r, g, b); let h, s, l = (max + min) / 2; if (max === min) { h = s = 0; } else { const d = max - min; s = l > 0.5 ? d / (2 - max - min) : d / (max + min); switch (max) { case r: h = (g - b) / d + (g < b ? 6 : 0); break; case g: h = (b - r) / d + 2; break; case b: h = (r - g) / d + 4; break; }h /= 6; } return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)]; }
            function luminance(r, g, b) { const lin = v => { v /= 255; return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); }; return 0.2126 * lin(r) + 0.7152 * lin(g) + 0.0722 * lin(b); }
            function colorFromPicker() { const hex = document.getElementById('colorPicker').value; document.getElementById('colorHexInput').value = hex; applyColor(hex); }
            function colorFromText() { const val = document.getElementById('colorHexInput').value.trim(); let r, g, b; try { if (/^#?[0-9a-fA-F]{3,6}$/.test(val)) { const hex = val.startsWith('#') ? val : '#' + val;[r, g, b] = hexToRgb(hex); } else if (val.startsWith('rgb')) { [r, g, b] = val.match(/\d+/g).map(Number); } else if (val.startsWith('hsl')) { const [h, s, l] = val.match(/[\d.]+/g).map(Number); const c = (1 - Math.abs(2 * l / 100 - 1)) * s / 100, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = l / 100 - c / 2; let r1 = 0, g1 = 0, b1 = 0; if (h < 60) { r1 = c; g1 = x; } else if (h < 120) { r1 = x; g1 = c; } else if (h < 180) { g1 = c; b1 = x; } else if (h < 240) { g1 = x; b1 = c; } else if (h < 300) { r1 = x; b1 = c; } else { r1 = c; b1 = x; } r = Math.round((r1 + m) * 255); g = Math.round((g1 + m) * 255); b = Math.round((b1 + m) * 255); } else return; const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join(''); document.getElementById('colorPicker').value = hex; applyColor(hex); } catch (e) { } }
            function applyColor(hex) {
                const [r, g, b] = hexToRgb(hex); const [h, s, l] = rgbToHsl(r, g, b); const lum = luminance(r, g, b), cW = ((1 + 0.05) / (lum + 0.05)).toFixed(2), cB = ((lum + 0.05) / (0 + 0.05)).toFixed(2); document.getElementById('colorSwatch').style.background = hex; document.getElementById('c-hex').textContent = hex.toUpperCase(); document.getElementById('c-rgb').textContent = `rgb(${r}, ${g}, ${b})`; document.getElementById('c-hsl').textContent = `hsl(${h}, ${s}%, ${l}%)`; document.getElementById('c-lum').textContent = lum.toFixed(4); document.getElementById('c-contrast').textContent = `vs white: ${cW}:1 | vs black: ${cB}:1`;
                const sw = document.getElementById('colorSwatches'); sw.innerHTML = ''; for (let i = 10; i <= 90; i += 10) { const mix = (a, b, t) => Math.round(a * (1 - t) + b * t); const isLight = i > 50; const tr = isLight ? mix(r, 255, (i - 50) / 50) : mix(0, r, i / 50); const tg = isLight ? mix(g, 255, (i - 50) / 50) : mix(0, g, i / 50); const tb = isLight ? mix(b, 255, (i - 50) / 50) : mix(0, b, i / 50); const th = '#' + [tr, tg, tb].map(v => Math.max(0, Math.min(255, v)).toString(16).padStart(2, '0')).join(''); const div = document.createElement('div'); div.title = th.toUpperCase(); div.style.cssText = `width:40px;height:40px;border-radius:6px;background:${th};cursor:pointer;border:1px solid var(--border);flex-shrink:0;`; div.onclick = () => { document.getElementById('colorPicker').value = th; document.getElementById('colorHexInput').value = th; applyColor(th); }; sw.appendChild(div); }
            }
            document.addEventListener('DOMContentLoaded', () => applyColor('#B07EFF'));
        </script>
