<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>(function () { var k = 'devbox_theme'; var stored = null; try { stored = localStorage.getItem(k); } catch (e) {} var t = stored || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'); document.documentElement.setAttribute('data-theme', t); function updateThemeColor(th) { var meta = document.querySelector('meta[name="theme-color"]'); if (meta) meta.setAttribute('content', th === 'light' ? '#F5F7FA' : '#0A0C10'); } function a(th) { document.documentElement.setAttribute('data-theme', th); try { localStorage.setItem(k, th); } catch (e) {} updateThemeColor(th); document.querySelectorAll('.theme-toggle').forEach(function (b) { var i = b.querySelector('.theme-toggle-icon'), l = b.querySelector('.theme-toggle-label'); if (i) i.textContent = th === 'light' ? '🌙' : '☀️'; if (l) l.textContent = th === 'light' ? 'Dark mode' : 'Light mode'; }); } window.toggleTheme = function () { a(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }; window.applyTheme = a; updateThemeColor(t); })();</script>
    <meta name="description" content="DevBox — Convert colors between HEX, RGB, and HSL">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Converter — DevBox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"></noscript>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16.png">
    <link rel="apple-touch-icon" href="../assets/icon-192.png">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0A0C10">
    <meta property="og:title" content="Color Converter — DevBox">
    <meta property="og:description" content="Convert colors between HEX, RGB, and HSL">
    <meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--pink-dim);color:var(--pink)">🎨</div>
                    <div>
                        <div class="tool-title">Color Converter</div>
                        <div class="tool-desc">Convert between HEX, RGB, HSL with contrast ratios and tints</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar"><span class="panel-label">Pick or enter a color</span>
                        <div class="panel-actions"><button class="share-btn" onclick="saveToURL({c:'colorHexInput'});navigator.clipboard.writeText(location.href).then(()=>showToast('🔗 Link copied!'))">⎘ Share</button></div>
                    </div>
                    <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);">
                        <input type="color" id="colorPicker" value="#B07EFF" oninput="colorFromPicker()" style="width:48px;height:48px;border:none;background:none;cursor:pointer;padding:0;border-radius:8px;overflow:hidden;">
                        <input type="text" id="colorHexInput" value="#B07EFF" placeholder="#B07EFF or rgb(…) or hsl(…)" oninput="colorFromText()" style="flex:1;padding:10px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--mono);font-size:0.9rem;color:var(--text);outline:none;">
                    </div>
                    <div style="height:50px;transition:background 0.2s;border-bottom:1px solid var(--border);" id="colorSwatch"></div>
                    <div class="hash-grid">
                        <div class="hash-row"><div class="hash-algo">HEX</div><div class="hash-val" id="c-hex" style="color:var(--pink)">—</div><button class="uuid-copy" onclick="copy(document.getElementById('c-hex').textContent)">⎘</button></div>
                        <div class="hash-row"><div class="hash-algo">RGB</div><div class="hash-val" id="c-rgb" style="color:var(--pink)">—</div><button class="uuid-copy" onclick="copy(document.getElementById('c-rgb').textContent)">⎘</button></div>
                        <div class="hash-row"><div class="hash-algo">HSL</div><div class="hash-val" id="c-hsl" style="color:var(--pink)">—</div><button class="uuid-copy" onclick="copy(document.getElementById('c-hsl').textContent)">⎘</button></div>
                        <div class="hash-row"><div class="hash-algo">Luminance</div><div class="hash-val" id="c-lum" style="color:var(--text-dim)">—</div></div>
                        <div class="hash-row"><div class="hash-algo">Contrast</div><div class="hash-val" id="c-contrast" style="color:var(--text-dim)">—</div></div>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-bar"><span class="panel-label">Tints &amp; Shades</span></div>
                    <div id="colorSwatches" style="display:flex;gap:6px;padding:14px 16px;flex-wrap:wrap;"></div>
                </div>
            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
    <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
    <script src="../assets/sidebar.js" defer></script>
    <script>
        function hexToRgb(hex) { hex = hex.replace(/^#/, ''); if (hex.length === 3) hex = hex.split('').map(c => c + c).join(''); const n = parseInt(hex, 16); return [n >> 16 & 255, n >> 8 & 255, n & 255]; }
        function rgbToHsl(r, g, b) { r /= 255; g /= 255; b /= 255; const max = Math.max(r, g, b), min = Math.min(r, g, b); let h, s, l = (max + min) / 2; if (max === min) { h = s = 0; } else { const d = max - min; s = l > 0.5 ? d / (2 - max - min) : d / (max + min); switch (max) { case r: h = (g - b) / d + (g < b ? 6 : 0); break; case g: h = (b - r) / d + 2; break; case b: h = (r - g) / d + 4; break; }h /= 6; } return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)]; }
        function luminance(r, g, b) { const lin = v => { v /= 255; return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); }; return 0.2126 * lin(r) + 0.7152 * lin(g) + 0.0722 * lin(b); }
        function colorFromPicker() { const hex = document.getElementById('colorPicker').value; document.getElementById('colorHexInput').value = hex; applyColor(hex); }
        function colorFromText() { const val = document.getElementById('colorHexInput').value.trim(); let r, g, b; try { if (/^#?[0-9a-fA-F]{3,6}$/.test(val)) { const hex = val.startsWith('#') ? val : '#' + val;[r, g, b] = hexToRgb(hex); } else if (val.startsWith('rgb')) { [r, g, b] = val.match(/\d+/g).map(Number); } else if (val.startsWith('hsl')) { const [h, s, l] = val.match(/[\d.]+/g).map(Number); const c = (1 - Math.abs(2 * l / 100 - 1)) * s / 100, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = l / 100 - c / 2; let r1 = 0, g1 = 0, b1 = 0; if (h < 60) { r1 = c; g1 = x; } else if (h < 120) { r1 = x; g1 = c; } else if (h < 180) { g1 = c; b1 = x; } else if (h < 240) { g1 = x; b1 = c; } else if (h < 300) { r1 = x; b1 = c; } else { r1 = c; b1 = x; } r = Math.round((r1 + m) * 255); g = Math.round((g1 + m) * 255); b = Math.round((b1 + m) * 255); } else return; const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join(''); document.getElementById('colorPicker').value = hex; applyColor(hex); } catch (e) { } }
        function applyColor(hex) {
            const [r, g, b] = hexToRgb(hex); const [h, s, l] = rgbToHsl(r, g, b); const lum = luminance(r, g, b), cW = ((1 + 0.05) / (lum + 0.05)).toFixed(2), cB = ((lum + 0.05) / (0 + 0.05)).toFixed(2); document.getElementById('colorSwatch').style.background = hex; document.getElementById('c-hex').textContent = hex.toUpperCase(); document.getElementById('c-rgb').textContent = `rgb(${r}, ${g}, ${b})`; document.getElementById('c-hsl').textContent = `hsl(${h}, ${s}%, ${l}%)`; document.getElementById('c-lum').textContent = lum.toFixed(4); document.getElementById('c-contrast').textContent = `vs white: ${cW}:1 | vs black: ${cB}:1`;
            const sw = document.getElementById('colorSwatches'); sw.innerHTML = ''; for (let i = 10; i <= 90; i += 10) { const mix = (a, b, t) => Math.round(a * (1 - t) + b * t); const isLight = i > 50; const tr = isLight ? mix(r, 255, (i - 50) / 50) : mix(0, r, i / 50); const tg = isLight ? mix(g, 255, (i - 50) / 50) : mix(0, g, i / 50); const tb = isLight ? mix(b, 255, (i - 50) / 50) : mix(0, b, i / 50); const th = '#' + [tr, tg, tb].map(v => Math.max(0, Math.min(255, v)).toString(16).padStart(2, '0')).join(''); const div = document.createElement('div'); div.title = th.toUpperCase(); div.style.cssText = `width:40px;height:40px;border-radius:6px;background:${th};cursor:pointer;border:1px solid var(--border);flex-shrink:0;`; div.onclick = () => { document.getElementById('colorPicker').value = th; document.getElementById('colorHexInput').value = th; applyColor(th); }; sw.appendChild(div); }
        }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1800); }
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(location.search);
            const c = params.get('c');
            if (c) { document.getElementById('colorHexInput').value = c; colorFromText(); }
            else applyColor('#B07EFF');
        });
    </script>
</body>
</html>
