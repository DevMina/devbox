<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="DevBox — Generate QR codes for URLs, WiFi, email, and more">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — DevBox</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<meta property="og:title" content="QR Code Generator — DevBox">
<meta property="og:description" content="Generate QR codes for URLs, WiFi, email, and more">
<meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--green-dim);color:var(--green)">⬛</div>
                    <div>
                        <div class="tool-title">QR Code Generator</div>
                        <div class="tool-desc">Generate QR codes for URLs, text, email, phone, and WiFi credentials</div>
                    </div>
                </div>

                <div class="two-col" style="align-items:start">
                    <div>
                        <div class="panel">
                            <div class="panel-bar"><span class="panel-label">Content type</span></div>
                            <div style="display:flex;gap:6px;padding:10px 14px;flex-wrap:wrap">
                                <button class="btn btn-green" id="qrTypeUrl" onclick="setQrType('url')">🔗 URL</button>
                                <button class="btn btn-ghost" id="qrTypeText" onclick="setQrType('text')">📝 Text</button>
                                <button class="btn btn-ghost" id="qrTypeEmail" onclick="setQrType('email')">📧 Email</button>
                                <button class="btn btn-ghost" id="qrTypePhone" onclick="setQrType('phone')">📱 Phone</button>
                                <button class="btn btn-ghost" id="qrTypeWifi" onclick="setQrType('wifi')">📶 WiFi</button>
                                <button class="btn btn-ghost" id="qrTypeSms" onclick="setQrType('sms')">💬 SMS</button>
                            </div>
                        </div>
                        <div class="panel" id="qrFields">
                            <div class="panel-bar"><span class="panel-label">Content</span></div>
                            <div id="qrDynFields"></div>
                            <div class="input-row" id="qrRawRow" style="border-bottom:none;display:none">
                                <textarea id="qrRaw" placeholder="Enter text content…" oninput="updateQR()" style="min-height:80px;padding:10px 0;border:none;outline:none;resize:vertical"></textarea>
                            </div>
                        </div>
                        <div class="panel" style="margin-top:14px">
                            <div class="panel-bar"><span class="panel-label">Style</span></div>
                            <div class="input-row"><label>Size</label><input type="range" id="qrSize" min="100" max="400" value="200" oninput="qrSizeUpdate()"><span id="qrSizeVal" style="font-family:var(--mono);font-size:0.72rem;color:var(--text-dim);min-width:50px">200px</span></div>
                            <div class="input-row"><label>Dark color</label><input type="color" id="qrDark" value="#000000" oninput="updateQR()" style="width:40px;height:32px;border:none;background:none;cursor:pointer;padding:0;border-radius:6px;flex:none"></div>
                            <div class="input-row" style="border-bottom:none"><label>Light color</label><input type="color" id="qrLight" value="#FFFFFF" oninput="updateQR()" style="width:40px;height:32px;border:none;background:none;cursor:pointer;padding:0;border-radius:6px;flex:none"></div>
                        </div>
                    </div>
                    <div>
                        <div class="panel">
                            <div class="panel-bar">
                                <span class="panel-label">QR Code</span>
                                <div class="panel-actions">
                                    <button class="btn btn-green" onclick="downloadQR()">↓ Download PNG</button>
                                    <button class="btn btn-ghost" onclick="copyQrData()">⎘ Copy data</button>
                                </div>
                            </div>
                            <div style="padding:20px;display:flex;justify-content:center;align-items:center;min-height:240px">
                                <canvas id="qrCanvas" style="border-radius:8px;border:1px solid var(--border)"></canvas>
                            </div>
                            <div id="qrDataPreview" style="padding:0 14px 14px;font-family:var(--mono);font-size:0.72rem;color:var(--text-dim);word-break:break-all"></div>
                        </div>
                    </div>
                </div>

            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </div><!-- /content-wrap -->
    </div>
    <div class="toast" id="toast"></div>
    <script src="../assets/theme.js"></script>
    <script src="../assets/shared.js"></script>
    <script src="../assets/sidebar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        let qrType = 'url';
        const QR_FIELDS = {
            url: [{ id: 'qrUrl', label: 'URL', placeholder: 'https://example.com', type: 'text' }],
            text: [],// uses raw textarea
            email: [{ id: 'qrEmailTo', label: 'To', placeholder: 'user@example.com', type: 'text' }, { id: 'qrEmailSub', label: 'Subject', placeholder: 'Hello', type: 'text' }, { id: 'qrEmailBody', label: 'Body', placeholder: 'Message…', type: 'text' }],
            phone: [{ id: 'qrPhone', label: 'Phone', placeholder: '+1 555 000 0000', type: 'tel' }],
            wifi: [{ id: 'qrSsid', label: 'SSID', placeholder: 'Network name', type: 'text' }, { id: 'qrWifiPass', label: 'Password', placeholder: 'WiFi password', type: 'text' }, { id: 'qrWifiSec', label: 'Security', placeholder: 'WPA2', type: 'text' }],
            sms: [{ id: 'qrSmsNum', label: 'Number', placeholder: '+1 555 000 0000', type: 'tel' }, { id: 'qrSmsMsg', label: 'Message', placeholder: 'SMS content…', type: 'text' }],
        };

        function setQrType(t) {
            qrType = t;
            Object.keys(QR_FIELDS).forEach(k => {
                const btn = document.getElementById('qrType' + k.charAt(0).toUpperCase() + k.slice(1));
                if (btn) btn.className = 'btn ' + (k === t ? 'btn-green' : 'btn-ghost');
            });
            const fields = QR_FIELDS[t];
            const rawRow = document.getElementById('qrRawRow');
            const dynFields = document.getElementById('qrDynFields');
            if (!fields || fields.length === 0) { rawRow.style.display = ''; dynFields.innerHTML = ''; }
            else {
                rawRow.style.display = 'none';
                dynFields.innerHTML = fields.map((f, i) => `<div class="input-row" style="${i === fields.length - 1 ? 'border-bottom:none' : ''}"><label>${f.label}</label><input type="${f.type}" id="${f.id}" placeholder="${f.placeholder}" oninput="updateQR()" style="font-family:var(--mono)"></div>`).join('');
            }
            updateQR();
        }

        function buildQrData() {
            switch (qrType) {
                case 'url': return (document.getElementById('qrUrl')?.value || '').trim() || 'https://example.com';
                case 'text': return (document.getElementById('qrRaw')?.value || '').trim();
                case 'email': { const to = document.getElementById('qrEmailTo')?.value || ''; const sub = document.getElementById('qrEmailSub')?.value || ''; const body = document.getElementById('qrEmailBody')?.value || ''; return `mailto:${to}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`; }
                case 'phone': return 'tel:' + (document.getElementById('qrPhone')?.value || '').replace(/\s/g, '');
                case 'wifi': { const ssid = document.getElementById('qrSsid')?.value || ''; const pass = document.getElementById('qrWifiPass')?.value || ''; const sec = document.getElementById('qrWifiSec')?.value || 'WPA'; return `WIFI:T:${sec};S:${ssid};P:${pass};;`; }
                case 'sms': { const num = document.getElementById('qrSmsNum')?.value || ''; const msg = document.getElementById('qrSmsMsg')?.value || ''; return `smsto:${num}:${msg}`; }
                default: return '';
            }
        }

        let qrLib = null;
        function updateQR() {
            const data = buildQrData();
            if (!data) { document.getElementById('qrDataPreview').textContent = 'No data yet'; return; }
            const size = parseInt(document.getElementById('qrSize').value);
            const dark = document.getElementById('qrDark').value;
            const light = document.getElementById('qrLight').value;
            const canvas = document.getElementById('qrCanvas');
            canvas.width = size; canvas.height = size;
            document.getElementById('qrDataPreview').textContent = data;
            try {
                if (qrLib) { qrLib.clear(); qrLib.makeCode(data); }
                else {
                    const div = document.createElement('div');
                    qrLib = new QRCode(div, { text: data, width: size, height: size, colorDark: dark, colorLight: light, correctLevel: QRCode.CorrectLevel.M });
                    setTimeout(() => { const img = div.querySelector('img'); if (img) { const ctx = canvas.getContext('2d'); const i = new Image(); i.onload = () => ctx.drawImage(i, 0, 0, size, size); i.src = img.src; } }, 100);
                    return;
                }
            } catch (e) { const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, size, size); ctx.fillStyle = light; ctx.fillRect(0, 0, size, size); ctx.fillStyle = dark; ctx.font = '14px monospace'; ctx.fillText('Error: ' + e.message, 10, 30); }
        }

        function qrSizeUpdate() { document.getElementById('qrSizeVal').textContent = document.getElementById('qrSize').value + 'px'; updateQR(); }
        function downloadQR() { const a = document.createElement('a'); a.href = document.getElementById('qrCanvas').toDataURL('image/png'); a.download = 'qrcode.png'; a.click(); showToast('QR code downloaded'); }
        function copyQrData() { copy(buildQrData()); }

        document.addEventListener('DOMContentLoaded', () => { setQrType('url'); });
    </script>
</body>
</html>
