<style id="critical-css">
/* ════════════════════════════════════════════

/* ── CSS Custom Properties ── */
:root {
  /* Background layers */
  --bg:       #0A0C10;
  --panel:    #0F1117;
  --surface:  #161B24;
  --surface2: #1C2330;

  /* Borders */
  --border:  #252D3D;
  --border2: #2E3A50;

  /* Text */
  --text:        #CDD6F0;
  --text-dim:    #7A8AAD;
  --text-bright: #EEF2FF;

  /* Accent palette */
  --green:       #3DFFA0;  --green-dim:  rgba(61,255,160,0.09);
  --blue:        #5BA4FF;  --blue-dim:   rgba(91,164,255,0.09);
  --orange:      #FF9A3C;  --orange-dim: rgba(255,154,60,0.09);
  --purple:      #B07EFF;  --purple-dim: rgba(176,126,255,0.09);
  --red:         #FF5E7A;  --red-dim:    rgba(255,94,122,0.09);
  --cyan:        #22D9F0;  --cyan-dim:   rgba(34,217,240,0.09);
  --yellow:      #FFD166;  --yellow-dim: rgba(255,209,102,0.09);
  --pink:        #FF79C6;  --pink-dim:   rgba(255,121,198,0.09);
  --teal:        #1EE8B8;  --teal-dim:   rgba(30,232,184,0.09);

  /* Typography */
  --font: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', 'Fira Code', monospace;

  /* Radii */
  --r:    10px;
  --r-sm:  6px;
  --r-xs:  4px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.45);

  /* Transitions */
  --transition: 0.15s ease;
  --transition-slow: 0.25s ease;

  /* Sidebar width */
  --sidebar-w: 228px;
  --sidebar-collapsed-w: 58px;
}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.app{display:flex;flex:1;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;}
[data-theme="light"] {
  --bg:       #F5F7FA;
  --panel:    #FFFFFF;
  --surface:  #EAEDF2;
  --surface2: #DDE1EA;

  --border:  #D1D7E3;
  --border2: #B8C0D2;

  --text:        #2D3452;
  --text-dim:    #566080;
  --text-bright: #111827;

  --green:       #006B43;  --green-dim:  rgba(0,168,107,0.1);
  --blue:        #2B6CB0;  --blue-dim:   rgba(43,108,176,0.1);
  --orange:      #9A4218;  --orange-dim: rgba(192,86,33,0.1);
  --purple:      #6B46C1;  --purple-dim: rgba(107,70,193,0.1);
  --red:         #C53030;  --red-dim:    rgba(197,48,48,0.1);
  --cyan:        #066678;  --cyan-dim:   rgba(9,135,160,0.1);
  --yellow:      #8A5A15;  --yellow-dim: rgba(183,121,31,0.1);
  --pink:        #97266D;  --pink-dim:   rgba(151,38,109,0.1);
  --teal:        #285E61;  --teal-dim:   rgba(40,94,97,0.1);
}
</style>
<meta name="description" content="DevBox — Generate Lorem Ipsum placeholder text">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — DevBox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">

</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--cyan-dim);color:var(--cyan)">¶</div>
                    <div>
                        <div class="tool-title">Lorem Ipsum Generator</div>
                        <div class="tool-desc">Generate realistic placeholder text for layouts and mockups</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar"><span class="panel-label">Options</span></div>
                    <div class="input-row">
                        <label>Type</label>
                        <select id="loremType" onchange="loremGenerate()" style="padding:6px 10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--mono);font-size:0.84rem;color:var(--text);outline:none;">
                            <option value="paragraphs">Paragraphs</option>
                            <option value="sentences">Sentences</option>
                            <option value="words">Words</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <label>Count: <span id="loremCountDisplay" style="color:var(--cyan)">3</span></label>
                        <input type="range" id="loremCount" min="1" max="20" value="3" oninput="document.getElementById('loremCountDisplay').textContent=this.value;loremGenerate()">
                    </div>
                    <div style="padding:8px 16px 14px;display:flex;gap:14px;flex-wrap:wrap;">
                        <label class="check-row"><input type="checkbox" id="loremStartClassic" checked onchange="loremGenerate()"> Start with "Lorem ipsum…"</label>
                        <label class="check-row"><input type="checkbox" id="loremHtml" onchange="loremGenerate()"> Wrap in &lt;p&gt; tags</label>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Output</span>
                        <div class="panel-actions">
                            <button class="btn btn-cyan" onclick="loremGenerate()">⟳ Regenerate</button>
                            <button class="btn btn-ghost" onclick="copy(document.getElementById('loremOutput').textContent)">⎘ Copy</button>
                        </div>
                    </div>
                    <div id="loremOutput" class="output-area" style="color:var(--cyan);font-size:0.85rem;line-height:1.8;min-height:200px;white-space:pre-wrap;"></div>
                </div>
            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
    <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
    <script src="../assets/sidebar.js" defer></script>
    <script>
        const LW = ['lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit', 'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore', 'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud', 'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo', 'consequat', 'duis', 'aute', 'irure', 'in', 'reprehenderit', 'voluptate', 'velit', 'esse', 'cillum', 'eu', 'fugiat', 'nulla', 'pariatur', 'excepteur', 'sint', 'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui', 'officia', 'deserunt', 'mollit', 'anim', 'est', 'laborum', 'cras', 'pulvinar', 'mattis', 'purus', 'id', 'varius', 'quam', 'quisque', 'faucibus', 'ornare', 'suspendisse'];
        function lSent(n) { const w = []; for (let i = 0; i < n; i++)w.push(LW[Math.floor(Math.random() * LW.length)]); const s = w.join(' '); return s.charAt(0).toUpperCase() + s.slice(1) + '.'; }
        function lPara(n) { const s = []; for (let i = 0; i < n; i++)s.push(lSent(Math.floor(Math.random() * 12) + 6)); return s.join(' '); }
        function loremGenerate() {
            const type = document.getElementById('loremType').value, count = parseInt(document.getElementById('loremCount').value), sc = document.getElementById('loremStartClassic').checked, wh = document.getElementById('loremHtml').checked, classic = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.'; let out = '';
            if (type === 'words') { const words = []; if (sc) classic.replace(/[.,]/g, '').split(' ').forEach(w => words.push(w)); while (words.length < count) words.push(LW[Math.floor(Math.random() * LW.length)]); out = words.slice(0, count).join(' '); }
            else if (type === 'sentences') { const s = []; if (sc) s.push(classic); while (s.length < count) s.push(lSent(Math.floor(Math.random() * 12) + 6)); out = s.slice(0, count).join(' '); }
            else { const p = []; if (sc) p.push(classic + ' ' + lPara(Math.floor(Math.random() * 3) + 2)); while (p.length < count) p.push(lPara(Math.floor(Math.random() * 4) + 3)); const ps = p.slice(0, count); out = wh ? ps.map(p => `<p>${p}</p>`).join('\n\n') : ps.join('\n\n'); }
            document.getElementById('loremOutput').textContent = out;
        }
        document.addEventListener('DOMContentLoaded', loremGenerate);
    </script>
</body>
