<style id="critical-css">
/* ════════════════════════════════════════════

/* ── CSS Custom Properties ── */
:root {
  /* Background layers */
  --bg:       #0A0C10;
  --panel:    #0F1117;
  --surface:  #161B24;
  --surface2: #1C2330;

  /* Borders */
  --border:  #252D3D;
  --border2: #2E3A50;

  /* Text */
  --text:        #CDD6F0;
  --text-dim:    #7A8AAD;
  --text-bright: #EEF2FF;

  /* Accent palette */
  --green:       #3DFFA0;  --green-dim:  rgba(61,255,160,0.09);
  --blue:        #5BA4FF;  --blue-dim:   rgba(91,164,255,0.09);
  --orange:      #FF9A3C;  --orange-dim: rgba(255,154,60,0.09);
  --purple:      #B07EFF;  --purple-dim: rgba(176,126,255,0.09);
  --red:         #FF5E7A;  --red-dim:    rgba(255,94,122,0.09);
  --cyan:        #22D9F0;  --cyan-dim:   rgba(34,217,240,0.09);
  --yellow:      #FFD166;  --yellow-dim: rgba(255,209,102,0.09);
  --pink:        #FF79C6;  --pink-dim:   rgba(255,121,198,0.09);
  --teal:        #1EE8B8;  --teal-dim:   rgba(30,232,184,0.09);

  /* Typography */
  --font: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', 'Fira Code', monospace;

  /* Radii */
  --r:    10px;
  --r-sm:  6px;
  --r-xs:  4px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.45);

  /* Transitions */
  --transition: 0.15s ease;
  --transition-slow: 0.25s ease;

  /* Sidebar width */
  --sidebar-w: 228px;
  --sidebar-collapsed-w: 58px;
}
body {
  font-family: var(--font);
  background: var(--bg);

  min-height: 100vh;

  --border:  #D1D7E3;
  --border2: #B8C0D2;

  --text:        #2D3452;

  --text-bright: #111827;

  --green:       #006B43;  --green-dim:  rgba(0,168,107,0.1);
  --blue:        #2B6CB0;  --blue-dim:   rgba(43,108,176,0.1);
  --orange:      #9A4218;  --orange-dim: rgba(192,86,33,0.1);
  --purple:      #6B46C1;  --purple-dim: rgba(107,70,193,0.1);
  --red:         #C53030;  --red-dim:    rgba(197,48,48,0.1);
  --cyan:        #066678;  --cyan-dim:   rgba(9,135,160,0.1);
  --yellow:      #8A5A15;  --yellow-dim: rgba(183,121,31,0.1);
  --pink:        #97266D;  --pink-dim:   rgba(151,38,109,0.1);

<meta name="description" content="DevBox — Encrypt and decrypt text with AES-256 in-browser">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Encrypt / Decrypt — DevBox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"></noscript>

<noscript><link rel="stylesheet" href="../assets/style.css"></noscript>
<meta property="og:title" content="Text Encrypt / Decrypt — DevBox">
<meta property="og:description" content="Encrypt and decrypt text with AES-256 in-browser">
<meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--yellow-dim);color:var(--yellow)">🔐</div>
                    <div>
                        <div class="tool-title">Text Encrypt / Decrypt</div>
                        <div class="tool-desc">Encrypt and decrypt text with AES-256 using a passphrase (runs entirely in-browser)</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Passphrase</span>
                        <div class="panel-actions">
                            <button class="btn btn-ghost" onclick="togglePassVis()">👁 Show/Hide</button>
                        </div>
                    </div>
                    <div class="input-row" style="border-bottom:none">
                        <input type="password" id="encPassphrase" placeholder="Enter a strong passphrase…" style="font-family:var(--mono)">
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Input</span>
                        <div class="panel-actions">
                            <button class="btn btn-yellow" onclick="doEncrypt()">🔒 Encrypt</button>
                            <button class="btn btn-ghost" onclick="doDecrypt()">🔓 Decrypt</button>
                            <button class="btn btn-ghost" onclick="swapEncrypt()">⇅ Swap</button>
                            <button class="btn btn-ghost" onclick="clearEncrypt()">Clear</button>
                        </div>
                    </div>
                    <textarea id="encInput" placeholder="Enter text to encrypt, or ciphertext to decrypt…" style="min-height:140px"></textarea>
                </div>
                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Output</span>
                        <div class="panel-actions">
                            <button class="btn btn-ghost" onclick="copy(document.getElementById('encOutput').textContent)">⎘ Copy</button>
                        </div>
                    </div>
                    <div id="encOutput" class="output-area" style="color:var(--yellow);word-break:break-all;min-height:120px"></div>
                </div>
                <div id="encStatus" style="display:none;padding:10px 14px;border-radius:var(--r-sm);font-size:0.82rem;font-family:var(--mono);margin-top:4px"></div>
                <div style="margin-top:12px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);font-size:0.75rem;color:var(--text-dim);line-height:1.6">
                    🔒 Uses AES-GCM-256 via the browser's native Web Crypto API. The passphrase never leaves your browser.
                </div>

            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
    <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
    <script src="../assets/sidebar.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js" defer></script>
    <script>
        function togglePassVis() { const i = document.getElementById('encPassphrase'); i.type = i.type === 'password' ? 'text' : 'password'; }
        function setStatus(msg, ok) { const s = document.getElementById('encStatus'); s.style.display = ''; s.style.background = ok ? 'var(--green-dim)' : 'var(--red-dim)'; s.style.border = '1px solid ' + (ok ? 'rgba(61,255,160,0.3)' : 'rgba(255,94,122,0.3)'); s.style.color = ok ? 'var(--green)' : 'var(--red)'; s.textContent = msg; }
        function doEncrypt() {
            const pass = document.getElementById('encPassphrase').value, txt = document.getElementById('encInput').value;
            if (!pass) { setStatus('Enter a passphrase first', false); return; } if (!txt) { setStatus('Enter text to encrypt', false); return; }
            try {
                const salt = CryptoJS.lib.WordArray.random(128 / 8);
                const key = CryptoJS.PBKDF2(pass, salt, { keySize: 256 / 32, iterations: 10000 });
                const iv = CryptoJS.lib.WordArray.random(128 / 8);
                const encrypted = CryptoJS.AES.encrypt(txt, key, { iv, padding: CryptoJS.pad.Pkcs7, mode: CryptoJS.mode.CBC });
                const out = salt.toString() + ':' + iv.toString() + ':' + encrypted.toString();
                document.getElementById('encOutput').textContent = out;
                setStatus('✓ Encrypted successfully (AES-256-CBC + PBKDF2)', true);
            } catch (e) { setStatus('Encryption error: ' + e.message, false); }
        }
        function doDecrypt() {
            const pass = document.getElementById('encPassphrase').value, cipher = document.getElementById('encInput').value.trim();
            if (!pass) { setStatus('Enter the passphrase', false); return; } if (!cipher) { setStatus('Enter ciphertext to decrypt', false); return; }
            try {
                const [saltHex, ivHex, cipherText] = cipher.split(':');
                if (!saltHex || !ivHex || !cipherText) { setStatus('Invalid ciphertext format', false); return; }
                const salt = CryptoJS.enc.Hex.parse(saltHex), iv = CryptoJS.enc.Hex.parse(ivHex);
                const key = CryptoJS.PBKDF2(pass, salt, { keySize: 256 / 32, iterations: 10000 });
                const decrypted = CryptoJS.AES.decrypt(cipherText, key, { iv, padding: CryptoJS.pad.Pkcs7, mode: CryptoJS.mode.CBC });
                const result = decrypted.toString(CryptoJS.enc.Utf8);
                if (!result) { setStatus('✗ Wrong passphrase or corrupted data', false); return; }
                document.getElementById('encOutput').textContent = result;
                setStatus('✓ Decrypted successfully', true);
            } catch (e) { setStatus('Decryption failed: wrong passphrase or corrupted data', false); }
        }
        function swapEncrypt() { const o = document.getElementById('encOutput').textContent; document.getElementById('encInput').value = o; document.getElementById('encOutput').textContent = ''; }
        function clearEncrypt() { document.getElementById('encInput').value = ''; document.getElementById('encOutput').textContent = ''; document.getElementById('encStatus').style.display = 'none'; }
    </script>
</body>
