<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>(function () { var k = 'devbox_theme'; var stored = null; try { stored = localStorage.getItem(k); } catch (e) {} var t = stored || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'); document.documentElement.setAttribute('data-theme', t); function updateThemeColor(th) { var meta = document.querySelector('meta[name="theme-color"]'); if (meta) meta.setAttribute('content', th === 'light' ? '#F5F7FA' : '#0A0C10'); } function a(th) { document.documentElement.setAttribute('data-theme', th); try { localStorage.setItem(k, th); } catch (e) {} updateThemeColor(th); document.querySelectorAll('.theme-toggle').forEach(function (b) { var i = b.querySelector('.theme-toggle-icon'), l = b.querySelector('.theme-toggle-label'); if (i) i.textContent = th === 'light' ? '🌙' : '☀️'; if (l) l.textContent = th === 'light' ? 'Dark mode' : 'Light mode'; }); } window.toggleTheme = function () { a(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }; window.applyTheme = a; updateThemeColor(t); })();</script>
    <meta name="description" content="DevBox — Encode and decode URL components">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Encoder/Decoder — DevBox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"></noscript>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16.png">
    <link rel="apple-touch-icon" href="../assets/icon-192.png">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0A0C10">
    <meta property="og:title" content="URL Encoder/Decoder — DevBox">
    <meta property="og:description" content="Encode and decode URL components">
    <meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--cyan-dim);color:var(--cyan)">URL</div>
                    <div>
                        <div class="tool-title">URL Encoder/Decoder</div>
                        <div class="tool-desc">Encode and decode URL components</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Input</span>
                        <div class="panel-actions">
                            <button class="btn btn-cyan" onclick="urlEncode()">Encode →</button>
                            <button class="btn btn-ghost" onclick="urlDecode()">← Decode</button>
                            <button class="btn btn-ghost" onclick="urlClear()">Clear</button>
                            <button class="share-btn" onclick="saveToURL({q:'urlInput'});navigator.clipboard.writeText(location.href).then(()=>showToast('🔗 Link copied!'))">⎘ Share</button>
                        </div>
                    </div>
                    <textarea id="urlInput" placeholder="https://example.com/path?q=hello world&foo=bar baz"></textarea>
                </div>
                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Output</span>
                        <div class="panel-actions">
                            <button class="btn btn-ghost" onclick="copy(document.getElementById('urlOutput').textContent)">⎘ Copy</button>
                            <button class="btn btn-ghost" onclick="urlSwap()">⇅ Swap</button>
                        </div>
                    </div>
                    <div id="urlOutput" class="output-area" style="color:var(--cyan)"></div>
                </div>

            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
    <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
    <script src="../assets/sidebar.js" defer></script>
    <script>
        function urlEncode() { document.getElementById('urlOutput').textContent = encodeURIComponent(document.getElementById('urlInput').value); }
        function urlDecode() { try { document.getElementById('urlOutput').textContent = decodeURIComponent(document.getElementById('urlInput').value); } catch (e) { document.getElementById('urlOutput').textContent = 'Error: malformed URI'; } }
        function urlSwap() { const o = document.getElementById('urlOutput').textContent; document.getElementById('urlInput').value = o; document.getElementById('urlOutput').textContent = ''; }
        function urlClear() { document.getElementById('urlInput').value = ''; document.getElementById('urlOutput').textContent = ''; history.replaceState(null,'',location.pathname); }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1800); }
        document.addEventListener('DOMContentLoaded', () => loadFromURL({ q: 'urlInput' }, urlEncode));
    </script>
</body>
</html>
