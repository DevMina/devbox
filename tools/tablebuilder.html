/* ════════════════════════════════════════════

/* ── CSS Custom Properties ── */
:root {
  /* Background layers */
  --bg:       #0A0C10;
  --panel:    #0F1117;
  --surface:  #161B24;
  --surface2: #1C2330;

  /* Borders */
  --border:  #252D3D;
  --border2: #2E3A50;

  /* Text */
  --text:        #CDD6F0;
  --text-dim:    #7A8AAD;
  --text-bright: #EEF2FF;

  /* Accent palette */
  --green:       #3DFFA0;  --green-dim:  rgba(61,255,160,0.09);
  --blue:        #5BA4FF;  --blue-dim:   rgba(91,164,255,0.09);
  --orange:      #FF9A3C;  --orange-dim: rgba(255,154,60,0.09);
  --purple:      #B07EFF;  --purple-dim: rgba(176,126,255,0.09);
  --red:         #FF5E7A;  --red-dim:    rgba(255,94,122,0.09);
  --cyan:        #22D9F0;  --cyan-dim:   rgba(34,217,240,0.09);
  --yellow:      #FFD166;  --yellow-dim: rgba(255,209,102,0.09);
  --pink:        #FF79C6;  --pink-dim:   rgba(255,121,198,0.09);
  --teal:        #1EE8B8;  --teal-dim:   rgba(30,232,184,0.09);

  /* Typography */
  --font: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', 'Fira Code', monospace;

  /* Radii */
  --r:    10px;
  --r-sm:  6px;
  --r-xs:  4px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.45);

  /* Transitions */
  --transition: 0.15s ease;
  --transition-slow: 0.25s ease;

  /* Sidebar width */
  --sidebar-w: 228px;
  --sidebar-collapsed-w: 58px;
}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.app{display:flex;flex:1;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;}
[data-theme="light"] {
  --bg:       #F5F7FA;

  --surface:  #EAEDF2;
  --surface2: #DDE1EA;

  --border:  #D1D7E3;
  --border2: #B8C0D2;

  --text:        #2D3452;

  --green:       #006B43;  --green-dim:  rgba(0,168,107,0.1);

  --orange:      #9A4218;  --orange-dim: rgba(192,86,33,0.1);
  --purple:      #6B46C1;  --purple-dim: rgba(107,70,193,0.1);
  --red:         #C53030;  --red-dim:    rgba(197,48,48,0.1);
  --cyan:        #066678;  --cyan-dim:   rgba(9,135,160,0.1);
  --yellow:      #8A5A15;  --yellow-dim: rgba(183,121,31,0.1);
  --pink:        #97266D;  --pink-dim:   rgba(151,38,109,0.1);
  --teal:        #285E61;  --teal-dim:   rgba(40,94,97,0.1);
}

<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--orange-dim);color:var(--orange)">▦</div>
                    <div>
                        <div class="tool-title">Table Builder</div>

                    </div>
                </div>

                <div class="panel" style="margin-bottom:14px">
                    <div class="panel-bar">
                        <span class="panel-label">Table settings</span>
                        <div class="panel-actions">
                            <button class="btn btn-orange" onclick="addCol()">+ Column</button>
                            <button class="btn btn-ghost" onclick="addRow()">+ Row</button>

                            <button class="btn btn-ghost" onclick="resetTable()">Reset</button>
                        </div>
                    </div>
                    <div style="overflow-x:auto;padding:14px 16px">
                        <table id="editTable" style="border-collapse:collapse;min-width:100%"></table>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Output format</span>
                        <div class="panel-actions">
                            <button class="btn btn-orange" onclick="setFmt('md');renderOut()" id="fmtMd">Markdown</button>
                            <button class="btn btn-ghost" onclick="setFmt('html');renderOut()" id="fmtHtml">HTML</button>
                            <button class="btn btn-ghost" onclick="setFmt('csv');renderOut()" id="fmtCsv">CSV</button>
                            <button class="btn btn-ghost" onclick="copy(document.getElementById('tableOut').textContent)">⎘ Copy</button>
                        </div>
                    </div>

        <script>
            let tData = { headers: ['Name', 'Age', 'City'], rows: [['Alice', '30', 'New York'], ['Bob', '25', 'London'], ['Carol', '35', 'Tokyo']] };
            let fmt = 'md';
            function setFmt(f) {
                fmt = f;['md', 'html', 'csv'].forEach(x => document.getElementById('fmtBtn' + (x === 'md' ? 'Md' : x === 'html' ? 'Html' : 'Csv')) && document.getElementById('fmtBtn' + (x === 'md' ? 'Md' : x === 'html' ? 'Html' : 'Csv')).classList.toggle('btn-orange', x === f));
                // update button styles
                document.getElementById('fmtMd').className = 'btn ' + (f === 'md' ? 'btn-orange' : 'btn-ghost');
                document.getElementById('fmtHtml').className = 'btn ' + (f === 'html' ? 'btn-orange' : 'btn-ghost');
                document.getElementById('fmtCsv').className = 'btn ' + (f === 'csv' ? 'btn-orange' : 'btn-ghost');
            }
            function cellStyle() { return 'padding:6px 10px;border:1px solid var(--border);background:var(--surface2);font-family:var(--mono);font-size:0.82rem;color:var(--text);outline:none;min-width:100px;max-width:200px;'; }
            function renderEdit() {
                const t = document.getElementById('editTable'); t.innerHTML = '';
                // Header row
                const thead = document.createElement('tr');
                tData.headers.forEach((h, ci) => {
                    const th = document.createElement('th'); th.style.cssText = 'padding:4px';
                    const inp = document.createElement('input'); inp.type = 'text'; inp.value = h; inp.style.cssText = cellStyle() + 'background:var(--surface);font-weight:600;color:var(--text-bright)';
                    inp.oninput = () => { tData.headers[ci] = inp.value; renderOut(); };
                    th.appendChild(inp); thead.appendChild(th);
                });
                // Delete col buttons
                const delRow = document.createElement('tr');
                tData.headers.forEach((_, ci) => { const td = document.createElement('td'); td.style.cssText = 'padding:2px 4px;text-align:center'; const btn = document.createElement('button'); btn.className = 'btn btn-ghost'; btn.style.cssText = 'padding:2px 8px;font-size:0.7rem'; btn.textContent = '− Col'; btn.onclick = () => removeCol(ci); td.appendChild(btn); delRow.appendChild(td); });
                t.appendChild(delRow); t.appendChild(thead);
                // Data rows
                tData.rows.forEach((row, ri) => {
                    const tr = document.createElement('tr');
                    tData.headers.forEach((_, ci) => {
                        const td = document.createElement('td'); td.style.cssText = 'padding:4px';
                        const inp = document.createElement('input'); inp.type = 'text'; inp.value = row[ci] || ''; inp.style.cssText = cellStyle();
                        inp.oninput = () => { tData.rows[ri][ci] = inp.value; renderOut(); };
                        td.appendChild(inp); tr.appendChild(td);
                    });
                    t.appendChild(tr);
                });
                renderOut();
            }
            function addCol() { tData.headers.push('Column ' + (tData.headers.length + 1)); tData.rows.forEach(r => r.push('')); renderEdit(); }
            function removeCol(ci) { if (tData.headers.length <= 1) return; tData.headers.splice(ci, 1); tData.rows.forEach(r => r.splice(ci, 1)); renderEdit(); }
            function addRow() { tData.rows.push(tData.headers.map(() => '')); renderEdit(); }
            function removeRow() { if (tData.rows.length > 0) tData.rows.pop(); renderEdit(); }
            function resetTable() { tData = { headers: ['Name', 'Age', 'City'], rows: [['Alice', '30', 'New York'], ['Bob', '25', 'London'], ['Carol', '35', 'Tokyo']] }; renderEdit(); }
            function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
            function renderOut() {
                const { headers, rows } = tData;
                let out = '';
                if (fmt === 'md') {
                    const colW = headers.map((_, i) => Math.max(headers[i].length, ...rows.map(r => (r[i] || '').length)));
                    const pad = (s, w) => s.padEnd(w, ' ');
                    out = '| ' + headers.map((h, i) => pad(h, colW[i])).join(' | ') + ' |
                    ';
                    out += '| ' + headers.map((_, i) => '-'.repeat(colW[i])).join(' | ') + ' |
                    ';
                    rows.forEach(r => {
                        out += '| ' + headers.map((_, i) => pad(r[i] || '', colW[i])).join(' | ') + ' |
                        ';});
                    }else if (fmt === 'html') {
                        out = '<table>
                            < thead >
                            <tr>
                                ';
            headers.forEach(h=>{out += `      <th>${esc(h)}</th>
`;});
                                out+='    </tr>
          </thead >
                            <tbody>
                                ';
            rows.forEach(r=>{out += '    <tr>
';headers.forEach((_,i)=>{out+=`      <td>${esc(r[i]||'')}</td>
`;});out+='    </tr>
                        ';});
                        out += '  </tbody>
</table > ';
                    } else {
                        const csvRow = arr => arr.map(v => {
                            const s = String(v || ''); return s.includes(',') || s.includes('"') || s.includes('
')?'"'+s.replace(/" / g, '""') + '"': s;
                        }).join(',');
                        out = csvRow(headers) + '
                        '+rows.map(r=>csvRow(headers.map((_,i)=>r[i]||''))).join('
                        ');
                    }
                    document.getElementById('tableOut').textContent = out;
                }
                document.addEventListener('DOMContentLoaded', renderEdit);
        </script>
