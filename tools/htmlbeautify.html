    <meta name="description" content="DevBox — Format and indent HTML markup">

</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--orange-dim);color:var(--orange)">&lt;/&gt;</div>
                    <div>
                        <div class="tool-title">HTML Beautifier</div>
                        <div class="tool-desc">Format and indent HTML markup for readability</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Input HTML</span>
                        <div class="panel-actions">
                            <button class="btn btn-orange" onclick="htmlBeautify()">⇄ Beautify</button>
                            <button class="btn btn-ghost" onclick="htmlMinifyTool()">⇉ Minify</button>
                            <button class="btn btn-ghost" onclick="htmlBSample()">Sample</button>
                            <button class="btn btn-ghost" onclick="document.getElementById('htmlBInput').value='';document.getElementById('htmlBOutput').textContent='';history.replaceState(null,'',location.pathname)">Clear</button>
                            <button class="share-btn" onclick="saveToURL({q:'htmlBInput'});navigator.clipboard.writeText(location.href).then(()=>showToast('🔗 Link copied!'))">⎘ Share</button>
                        </div>
                    </div>
                    <div class="drop-zone-global" id="htmlDropZone" data-clickable>↑ Drop .html file or click to upload</div>
                    <textarea id="htmlBInput" style="min-height:160px" placeholder="<html><head><title>Test</title></head><body><p>Hello</p></body></html>"></textarea>
                </div>
                <div class="panel">
                    <div class="panel-bar"><span class="panel-label">Output</span><div class="panel-actions"><button class="btn btn-ghost" onclick="copy(document.getElementById('htmlBOutput').textContent)">⎘ Copy</button></div></div>
                    <div id="htmlBOutput" class="output-area" style="color:var(--orange);white-space:pre;min-height:160px;overflow-x:auto;font-size:0.82rem"></div>
                </div>
            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
    <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
    <script src="../assets/sidebar.js" defer></script>
    <script>
        const VOID_TAGS = new Set(['area', 'base', 'br', 'col', 'embed', 'hr', 'img', 'input', 'link', 'meta', 'param', 'source', 'track', 'wbr']);
        const INLINE_TAGS = new Set(['a', 'abbr', 'b', 'bdi', 'bdo', 'br', 'cite', 'code', 'data', 'dfn', 'em', 'i', 'kbd', 'mark', 'q', 's', 'samp', 'small', 'span', 'strong', 'sub', 'sup', 'time', 'u', 'var', 'wbr']);
        function htmlBeautify() {
            const input = document.getElementById('htmlBInput').value.trim();

            if (!input) {
                document.getElementById('htmlBOutput').textContent = '';
                return;
            }

            const indentSize = '  ';
            let depth = 0;
            let output = [];

            // Split HTML safely by tags
            const tokens = input
                .replace(/>\s*</g, '><')
                .split(/(<[^>]+>)/)
                .filter(Boolean);

            tokens.forEach(token => {

                token = token.trim();

                if (!token) return;

                // Closing tag
                if (token.startsWith('</')) {
                    depth = Math.max(depth - 1, 0);
                    output.push(indentSize.repeat(depth) + token);
                    return;
                }

                // Opening/self closing tag
                if (token.startsWith('<')) {

                    const match = token.match(/^<\s*([a-zA-Z0-9-]+)/);
                    const tagName = match ? match[1].toLowerCase() : '';

                    const isVoid = VOID_TAGS.has(tagName);
                    const isSelfClosing = token.endsWith('/>');

                    output.push(
                        indentSize.repeat(depth) + token
                    );

                    if (!isVoid && !isSelfClosing) {
                        depth++;
                    }

                    return;
                }

                // Text content
                if (token.trim()) {

                    const text = token.trim();

                    // Keep inline text with parent tags
                    if (text.length < 80) {
                        output[output.length - 1] += text;
                    } else {
                        output.push(
                            indentSize.repeat(depth) + text
                        );
                    }
                }
            });

            document.getElementById('htmlBOutput').textContent =
                output.join('\n');
        }
        function htmlMinifyTool() { let html = document.getElementById('htmlBInput').value; html = html.replace(/<!--[\s\S]*?-->/g, '').replace(/\s+/g, ' ').replace(/> </g, '><').trim(); document.getElementById('htmlBOutput').textContent = html; }
        function htmlBSample() { document.getElementById('htmlBInput').value = '<html><head><title>Sample</title><meta charset="UTF-8"><link rel="stylesheet" href="style.css"></head><body><header><nav><ul><li><a href="/">Home</a></li><li><a href="/about">About</a></li></ul></nav></header><main><section><h1>Welcome</h1><p>This is a sample page.</p></section></main><footer><p>&copy; 2024</p></footer></body></html>'; }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1800); }
        document.addEventListener('DOMContentLoaded', () => {
            initDropZone('#htmlDropZone', ['.html','.htm','text/html'], (text) => {
                document.getElementById('htmlBInput').value = text;
                htmlBeautify();
            });
            loadFromURL({ q: 'htmlBInput' }, htmlBeautify);
        });
    </script>
</body>
