<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="DevBox — Format and indent HTML markup">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Beautifier — DevBox</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<meta property="og:title" content="HTML Beautifier — DevBox">
<meta property="og:description" content="Format and indent HTML markup">
<meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--orange-dim);color:var(--orange)">&lt;/&gt;</div>
                    <div>
                        <div class="tool-title">HTML Beautifier</div>
                        <div class="tool-desc">Format and indent HTML markup for readability</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Input HTML</span>
                        <div class="panel-actions">
                            <button class="btn btn-orange" onclick="htmlBeautify()">⇄ Beautify</button>
                            <button class="btn btn-ghost" onclick="htmlMinifyTool()">⇉ Minify</button>
                            <button class="btn btn-ghost" onclick="htmlBSample()">Sample</button>
                            <button class="btn btn-ghost" onclick="document.getElementById('htmlBInput').value='';document.getElementById('htmlBOutput').textContent=''">Clear</button>
                        </div>
                    </div>
                    <textarea id="htmlBInput" style="min-height:160px" placeholder="<html><head><title>Test</title></head><body><p>Hello</p></body></html>"></textarea>
                </div>
                <div class="panel">
                    <div class="panel-bar"><span class="panel-label">Output</span><div class="panel-actions"><button class="btn btn-ghost" onclick="copy(document.getElementById('htmlBOutput').textContent)">⎘ Copy</button></div></div>
                    <div id="htmlBOutput" class="output-area" style="color:var(--orange);white-space:pre;min-height:160px;overflow-x:auto;font-size:0.82rem"></div>
                </div>
            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </div><!-- /content-wrap -->
    </div>
    <div class="toast" id="toast"></div>
    <script src="../assets/shared.js"></script>
    <script src="../assets/sidebar.js"></script>
    <script>
        const VOID_TAGS = new Set(['area', 'base', 'br', 'col', 'embed', 'hr', 'img', 'input', 'link', 'meta', 'param', 'source', 'track', 'wbr']);
        const INLINE_TAGS = new Set(['a', 'abbr', 'b', 'bdi', 'bdo', 'br', 'cite', 'code', 'data', 'dfn', 'em', 'i', 'kbd', 'mark', 'q', 's', 'samp', 'small', 'span', 'strong', 'sub', 'sup', 'time', 'u', 'var', 'wbr']);
        function htmlBeautify() {
            let html = document.getElementById('htmlBInput').value.trim(); if (!html) return; let result = '', depth = 0, i = 0; const ind = () => '  '.repeat(depth); while (i < html.length) {
                if (html[i] === '<') {
                    const end = html.indexOf('>', i); if (end === -1) { result += html.slice(i); break; } const tag = html.slice(i, end + 1); const tagName = (tag.match(/<\/?([a-zA-Z][a-zA-Z0-9-]*)/)) || []; const tn = (tagName[1] || '').toLowerCase(); const isClose = tag.startsWith('</'); const isSelf = tag.endsWith('/>') || VOID_TAGS.has(tn); const isInline = INLINE_TAGS.has(tn); if (isClose) {
                        depth = Math.max(0, depth - 1); result += (result.endsWith('
')?ind():'')+tag+'
';}else if(isSelf){result+=ind()+tag+'
';}else{result+=ind()+tag+'
';if(!isInline)depth++;}i=end+1;}else{const nextTag=html.indexOf(' < ',i);const text=(nextTag===-1?html.slice(i):html.slice(i,nextTag)).trim();if(text)result+=ind()+text+'
';i=nextTag===-1?html.length:nextTag;}}document.getElementById('htmlBOutput').textContent=result.trim();}
function htmlMinifyTool() { let html = document.getElementById('htmlBInput').value; html = html.replace(/<!--[\s\S]*?-->/g, '').replace(/\s+/g, ' ').replace(/> </g, '><').trim(); document.getElementById('htmlBOutput').textContent = html; }
function htmlBSample() { document.getElementById('htmlBInput').value = '<html><head><title>Sample</title><meta charset="UTF-8"><link rel="stylesheet" href="style.css"></head><body><header><nav><ul><li><a href="/">Home</a></li><li><a href="/about">About</a></li></ul></nav></header><main><section><h1>Welcome</h1><p>This is a sample page.</p></section></main><footer><p>&copy; 2024</p></footer></body></html>'; }
    </script>
</body>
</html>
