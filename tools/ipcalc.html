/* ── CSS Custom Properties ── */
:root {
  /* Background layers */
  --bg:       #0A0C10;
  --panel:    #0F1117;
  --surface:  #161B24;
  --surface2: #1C2330;

  /* Borders */
  --border:  #252D3D;
  --border2: #2E3A50;

  /* Text */
  --text:        #CDD6F0;
  --text-dim:    #7A8AAD;
  --text-bright: #EEF2FF;

  /* Accent palette */
  --green:       #3DFFA0;  --green-dim:  rgba(61,255,160,0.09);
  --blue:        #5BA4FF;  --blue-dim:   rgba(91,164,255,0.09);
  --orange:      #FF9A3C;  --orange-dim: rgba(255,154,60,0.09);
  --purple:      #B07EFF;  --purple-dim: rgba(176,126,255,0.09);
  --red:         #FF5E7A;  --red-dim:    rgba(255,94,122,0.09);
  --cyan:        #22D9F0;  --cyan-dim:   rgba(34,217,240,0.09);
  --yellow:      #FFD166;  --yellow-dim: rgba(255,209,102,0.09);
  --pink:        #FF79C6;  --pink-dim:   rgba(255,121,198,0.09);
  --teal:        #1EE8B8;  --teal-dim:   rgba(30,232,184,0.09);

  /* Typography */
  --font: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', 'Fira Code', monospace;

  /* Radii */
  --r:    10px;
  --r-sm:  6px;
  --r-xs:  4px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.45);

  /* Transitions */
  --transition: 0.15s ease;
  --transition-slow: 0.25s ease;

  /* Sidebar width */
  --sidebar-w: 228px;
  --sidebar-collapsed-w: 58px;
}
body {
  font-family: var(--font);

<meta name="description" content="DevBox — Calculate subnet info from IP and CIDR notation">

<title>IP Calculator — DevBox</title>

<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--blue-dim);color:var(--blue)">IP</div>
                    <div>
                        <div class="tool-title">IP Calculator</div>
                        <div class="tool-desc">Calculate subnet info from IP address and CIDR notation</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">IP Address / CIDR</span>
                        <div class="panel-actions">
                            <button class="btn btn-ghost" onclick="ipSet('192.168.1.0/24')">192.168.1.0/24</button>
                            <button class="btn btn-ghost" onclick="ipSet('10.0.0.0/8')">10.0.0.0/8</button>
                            <button class="btn btn-ghost" onclick="ipSet('172.16.0.0/12')">172.16.0.0/12</button>
                        </div>
                    </div>
                    <div class="input-row" style="border-bottom:none">
                        <input type="text" id="ipInput" placeholder="192.168.1.100/24" oninput="calcIP()" style="font-family:var(--mono);font-size:1rem">
                    </div>
                </div>
                <div class="panel"><div class="panel-bar"><span class="panel-label">Subnet details</span></div><div class="hash-grid" id="ipResults"></div></div>
                <div class="two-col">
                    <div class="panel"><div class="panel-bar"><span class="panel-label">Binary</span></div><div id="ipBinary" class="output-area" style="font-size:0.76rem;color:var(--blue);word-break:break-all;min-height:80px"></div></div>
                    <div class="panel"><div class="panel-bar"><span class="panel-label">IP class &amp; type</span></div><div id="ipClass" class="output-area" style="font-size:0.82rem;min-height:80px"></div></div>
                </div>
            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
    <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
    <script src="../assets/sidebar.js" defer></script>
    <script>
        function ipSet(v) { document.getElementById('ipInput').value = v; calcIP(); }
        function calcIP() {
            const raw = document.getElementById('ipInput').value.trim(), results = document.getElementById('ipResults'), binary = document.getElementById('ipBinary'), cls = document.getElementById('ipClass'); if (!raw) { results.innerHTML = ''; binary.textContent = ''; cls.textContent = ''; return; } const cm = raw.match(/^(\d+\.\d+\.\d+\.\d+)\/(\d+)$/), io = raw.match(/^(\d+\.\d+\.\d+\.\d+)$/); let ip, prefix; if (cm) { ip = cm[1]; prefix = parseInt(cm[2]); } else if (io) { ip = io[1]; prefix = 24; } else { results.innerHTML = '<div class="hash-row" style="color:var(--red)">Invalid IP. Use: 192.168.1.0/24</div>'; return; } const parts = ip.split('.').map(Number); if (parts.some(p => p < 0 || p > 255 || isNaN(p)) || prefix < 0 || prefix > 32) { results.innerHTML = '<div class="hash-row" style="color:var(--red)">Invalid IP or prefix</div>'; return; } const ipN = parts.reduce((a, p) => (a << 8) + p, 0) >>> 0, maskN = prefix === 0 ? 0 : (0xFFFFFFFF << (32 - prefix)) >>> 0, netN = (ipN & maskN) >>> 0, broadN = (netN | (~maskN >>> 0)) >>> 0, firstN = prefix < 31 ? (netN + 1) >>> 0 : netN, lastN = prefix < 31 ? (broadN - 1) >>> 0 : broadN, hosts = prefix >= 31 ? Math.pow(2, 32 - prefix) : Math.pow(2, 32 - prefix) - 2; const toIP = n => [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255].join('.'); const toBin = n => [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255].map(v => v.toString(2).padStart(8, '0')).join('.'); results.innerHTML = [['Network', toIP(netN) + '/' + prefix], ['Subnet mask', toIP(maskN)], ['Wildcard', toIP(~maskN >>> 0)], ['First host', toIP(firstN)], ['Last host', toIP(lastN)], ['Broadcast', toIP(broadN)], ['Total hosts', hosts.toLocaleString()]].map(([l, v]) => `<div class="hash-row"><div class="hash-algo">${l}</div><div class="hash-val" style="color:var(--blue)">${v}</div><button class="uuid-copy" onclick="copy('${v}')">⎘</button></div>`).join(''); binary.textContent = `IP:   ${toBin(ipN)}
Mask: ${toBin(maskN)}
Net:  ${toBin(netN)}`; const f = parts[0]; let ipClass = '', pvt = ''; if (f < 128) ipClass = 'A (0–127)'; else if (f < 192) ipClass = 'B (128–191)'; else if (f < 224) ipClass = 'C (192–223)'; else if (f < 240) ipClass = 'D — Multicast'; else ipClass = 'E — Reserved'; if ((parts[0] === 10) || (parts[0] === 172 && parts[1] >= 16 && parts[1] <= 31) || (parts[0] === 192 && parts[1] === 168)) pvt = 'Private'; else if (parts[0] === 127) pvt = 'Loopback'; else if (parts[0] === 169 && parts[1] === 254) pvt = 'Link-local'; else pvt = 'Public'; cls.innerHTML = `<span style="color:var(--blue)">Class:</span> <strong style="color:var(--text)">${ipClass}</strong><br><span style="color:var(--blue)">Type:</span> <strong style="color:${pvt === 'Public' ? 'var(--green)' : 'var(--yellow)'}">${pvt}</strong><br><span style="color:var(--blue)">Prefix:</span> <strong style="color:var(--text)">/${prefix}</strong>`;
        }
    </script>
