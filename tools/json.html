<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>(function () { var k = 'devbox_theme'; var stored = null; try { stored = localStorage.getItem(k); } catch (e) {} var t = stored || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'); document.documentElement.setAttribute('data-theme', t); function updateThemeColor(th) { var meta = document.querySelector('meta[name="theme-color"]'); if (meta) meta.setAttribute('content', th === 'light' ? '#F5F7FA' : '#0A0C10'); } function a(th) { document.documentElement.setAttribute('data-theme', th); try { localStorage.setItem(k, th); } catch (e) {} updateThemeColor(th); document.querySelectorAll('.theme-toggle').forEach(function (b) { var i = b.querySelector('.theme-toggle-icon'), l = b.querySelector('.theme-toggle-label'); if (i) i.textContent = th === 'light' ? '🌙' : '☀️'; if (l) l.textContent = th === 'light' ? 'Dark mode' : 'Light mode'; }); } window.toggleTheme = function () { a(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }; window.applyTheme = a; updateThemeColor(t); })();</script>
    <meta name="description" content="DevBox — Format, validate, and minify JSON data">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter — DevBox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"></noscript>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16.png">
    <link rel="apple-touch-icon" href="../assets/icon-192.png">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0A0C10">
    <meta property="og:title" content="JSON Formatter — DevBox">
    <meta property="og:description" content="Format, validate, and minify JSON data">
    <meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--green-dim);color:var(--green)">{}</div>
                    <div>
                        <div class="tool-title">JSON Formatter</div>
                        <div class="tool-desc">Pretty-print, minify, and validate JSON</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Input</span>
                        <div class="panel-actions">
                            <span id="jsonStatus"></span>
                            <button class="btn btn-ghost" onclick="jsonClear()">Clear</button>
                            <button class="btn btn-ghost" onclick="jsonSample()">Sample</button>
                            <button class="share-btn" onclick="jsonShare()" title="Copy shareable link">⎘ Share</button>
                        </div>
                    </div>
                    <div class="drop-zone-global" id="jsonDropZone" data-clickable>↑ Drop .json file or click to upload</div>
                    <textarea id="jsonInput" placeholder='{"key":"value","arr":[1,2,3]}' oninput="jsonLive()" style="min-height:180px"></textarea>
                </div>
                <div class="panel-actions" style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;">
                    <button class="btn btn-green" onclick="jsonFormat()">⇄ Pretty print</button>
                    <button class="btn btn-ghost" onclick="jsonMinify()">⇉ Minify</button>
                    <button class="btn btn-ghost" onclick="jsonCopyOut()">⎘ Copy output</button>
                </div>
                <div class="panel">
                    <div class="panel-bar"><span class="panel-label">Output</span></div>
                    <div id="jsonOutput" class="output-area" style="color:var(--green)"></div>
                </div>

            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
    <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
    <script src="../assets/sidebar.js" defer></script>
    <script>
        window._toolShortcuts = [
            { desc: 'Format / Pretty-print', keys: ['Ctrl', 'Enter'] },
            { desc: 'Minify', keys: ['Ctrl', 'Shift', 'M'] },
            { desc: 'Copy output', keys: ['Ctrl', 'Shift', 'C'] },
            { desc: 'Clear', keys: ['Ctrl', 'Shift', 'X'] },
        ];
        function jsonLive() { const r = document.getElementById('jsonInput').value.trim(), s = document.getElementById('jsonStatus'); if (!r) { s.innerHTML = ''; return; } try { JSON.parse(r); s.innerHTML = '<span class="status-badge badge-ok">✓ Valid JSON</span>'; } catch (e) { s.innerHTML = '<span class="status-badge badge-err">✗ ' + e.message.split('\n')[0] + '</span>'; } }
        function jsonFormat() { try { const p = JSON.parse(document.getElementById('jsonInput').value); const o = document.getElementById('jsonOutput'); o.textContent = JSON.stringify(p, null, 2); o.style.color = 'var(--green)'; } catch (e) { const o = document.getElementById('jsonOutput'); o.textContent = '// Error: ' + e.message; o.style.color = 'var(--red)'; } }
        function jsonMinify() { try { const p = JSON.parse(document.getElementById('jsonInput').value); const o = document.getElementById('jsonOutput'); o.textContent = JSON.stringify(p); o.style.color = 'var(--green)'; } catch (e) { const o = document.getElementById('jsonOutput'); o.textContent = '// Error: ' + e.message; o.style.color = 'var(--red)'; } }
        function jsonCopyOut() { copy(document.getElementById('jsonOutput').textContent); }
        function jsonClear() { document.getElementById('jsonInput').value = ''; document.getElementById('jsonOutput').textContent = ''; document.getElementById('jsonStatus').innerHTML = ''; history.replaceState(null,'',location.pathname); }
        function jsonSample() { document.getElementById('jsonInput').value = JSON.stringify({ name: "John Doe", age: 30, email: "john@example.com", roles: ["admin", "editor"], address: { city: "New York", zip: "10001" }, active: true }, null, 0); jsonLive(); }
        function jsonShare() { saveToURL({ q: 'jsonInput' }); navigator.clipboard.writeText(location.href).then(() => showToast('🔗 Link copied!')); }
        document.addEventListener('DOMContentLoaded', () => {
            initDropZone('#jsonDropZone', ['.json','application/json'], (text) => {
                document.getElementById('jsonInput').value = text;
                jsonLive();
            });
            loadFromURL({ q: 'jsonInput' }, jsonLive);
            document.addEventListener('keydown', e => {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 'Enter') { e.preventDefault(); jsonFormat(); }
                    if (e.shiftKey && e.key === 'M') { e.preventDefault(); jsonMinify(); }
                    if (e.shiftKey && e.key === 'C') { e.preventDefault(); jsonCopyOut(); }
                    if (e.shiftKey && e.key === 'X') { e.preventDefault(); jsonClear(); }
                }
            });
        });
    </script>
</body>
</html>
