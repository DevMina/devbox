<style id="critical-css">
/* ════════════════════════════════════════════

/* ── CSS Custom Properties ── */
:root {
  /* Background layers */
  --bg:       #0A0C10;
  --panel:    #0F1117;
  --surface:  #161B24;
  --surface2: #1C2330;

  /* Borders */
  --border:  #252D3D;
  --border2: #2E3A50;

  /* Text */
  --text:        #CDD6F0;
  --text-dim:    #7A8AAD;
  --text-bright: #EEF2FF;

  /* Accent palette */
  --green:       #3DFFA0;  --green-dim:  rgba(61,255,160,0.09);
  --blue:        #5BA4FF;  --blue-dim:   rgba(91,164,255,0.09);
  --orange:      #FF9A3C;  --orange-dim: rgba(255,154,60,0.09);
  --purple:      #B07EFF;  --purple-dim: rgba(176,126,255,0.09);
  --red:         #FF5E7A;  --red-dim:    rgba(255,94,122,0.09);
  --cyan:        #22D9F0;  --cyan-dim:   rgba(34,217,240,0.09);
  --yellow:      #FFD166;  --yellow-dim: rgba(255,209,102,0.09);
  --pink:        #FF79C6;  --pink-dim:   rgba(255,121,198,0.09);
  --teal:        #1EE8B8;  --teal-dim:   rgba(30,232,184,0.09);

  /* Typography */
  --font: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', 'Fira Code', monospace;

  /* Radii */
  --r:    10px;
  --r-sm:  6px;
  --r-xs:  4px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.45);

  /* Transitions */
  --transition: 0.15s ease;
  --transition-slow: 0.25s ease;

  /* Sidebar width */
  --sidebar-w: 228px;
  --sidebar-collapsed-w: 58px;
}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.app{display:flex;flex:1;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;}
[data-theme="light"] {
  --bg:       #F5F7FA;
  --panel:    #FFFFFF;
  --surface:  #EAEDF2;
  --surface2: #DDE1EA;

  --border:  #D1D7E3;
  --border2: #B8C0D2;

  --text:        #2D3452;
  --text-dim:    #566080;
  --text-bright: #111827;

  --green:       #006B43;  --green-dim:  rgba(0,168,107,0.1);
  --blue:        #2B6CB0;  --blue-dim:   rgba(43,108,176,0.1);
  --orange:      #9A4218;  --orange-dim: rgba(192,86,33,0.1);
  --purple:      #6B46C1;  --purple-dim: rgba(107,70,193,0.1);
  --red:         #C53030;  --red-dim:    rgba(197,48,48,0.1);
  --cyan:        #066678;  --cyan-dim:   rgba(9,135,160,0.1);
  --yellow:      #8A5A15;  --yellow-dim: rgba(183,121,31,0.1);
  --pink:        #97266D;  --pink-dim:   rgba(151,38,109,0.1);

<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--yellow-dim);color:var(--yellow)">≡</div>
                    <div>
                        <div class="tool-title">Line Sorter</div>
                        <div class="tool-desc">Sort, deduplicate, shuffle, and transform lines of text</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Input — one item per line</span>
                        <div class="panel-actions">
                            <button class="btn btn-ghost" onclick="lsSample()">Sample</button>
                            <button class="btn btn-ghost" onclick="document.getElementById('lsInput').value='';document.getElementById('lsOutput').textContent=''">Clear</button>
                        </div>
                    </div>
                    <textarea id="lsInput" oninput="lsStats()" style="min-height:160px" placeholder="banana&#10;apple&#10;cherry&#10;apple&#10;date"></textarea>
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
                    <button class="btn btn-yellow" onclick="lsDo('sortaz')">A→Z</button>
                    <button class="btn btn-ghost" onclick="lsDo('sortza')">Z→A</button>
                    <button class="btn btn-ghost" onclick="lsDo('sortlen')">By length</button>
                    <button class="btn btn-ghost" onclick="lsDo('reverse')">Reverse</button>
                    <button class="btn btn-ghost" onclick="lsDo('shuffle')">Shuffle</button>
                    <button class="btn btn-ghost" onclick="lsDo('dedup')">Remove dupes</button>
                    <button class="btn btn-ghost" onclick="lsDo('trim')">Trim spaces</button>
                    <button class="btn btn-ghost" onclick="lsDo('empty')">Remove empty</button>
                    <button class="btn btn-ghost" onclick="lsDo('lower')">lowercase</button>
                    <button class="btn btn-ghost" onclick="lsDo('upper')">UPPERCASE</button>
                    <button class="btn btn-ghost" onclick="lsDo('number')">Add numbers</button>
                </div>
                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Output</span>
                        <span id="lsStatsEl" style="font-family:var(--mono);font-size:0.72rem;color:var(--text-dim)"></span>
                        <div class="panel-actions"><button class="btn btn-ghost" onclick="copy(document.getElementById('lsOutput').textContent)">⎘ Copy</button></div>
                    </div>
                    <div id="lsOutput" class="output-area" style="color:var(--yellow);white-space:pre-wrap;min-height:120px"></div>
                </div>
            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
        <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
        <script src="../assets/sidebar.js" defer></script>
        <script>
            function lsStats() {
                const l = document.getElementById('lsInput').value.split('
'),e=document.getElementById('lsStatsEl');if(e)e.textContent=`${l.length} lines · ${l.filter(x=>x.trim()).length} non-empty`;}
function lsDo(op) {
                        let lines = document.getElementById('lsInput').value.split('
');switch(op){case 'sortaz':lines.sort((a,b)=>a.localeCompare(b));break;case 'sortza':lines.sort((a,b)=>b.localeCompare(a));break;case 'sortlen':lines.sort((a,b)=>a.length-b.length);break;case 'reverse':lines.reverse();break;case 'shuffle':for(let i=lines.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[lines[i],lines[j]]=[lines[j],lines[i]];}break;case 'dedup':lines=[...new Set(lines)];break;case 'trim':lines=lines.map(l=>l.trim());break;case 'empty':lines=lines.filter(l=>l.trim());break;case 'lower':lines=lines.map(l=>l.toLowerCase());break;case 'upper':lines=lines.map(l=>l.toUpperCase());break;case 'number':lines=lines.map((l,i)=>`${i+1}. ${l}`);break;}document.getElementById('lsOutput').textContent=lines.join('
');const e=document.getElementById('lsStatsEl');if(e)e.textContent=`${lines.length} lines`;}
function lsSample() {
                                document.getElementById('lsInput').value = 'banana
                                apple
                                cherry
                                apple
                                date
                                banana
                                elderberry
                                fig
                                grape
banana';lsStats();}
        </script>
