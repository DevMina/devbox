<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>(function () { var k = 'devbox_theme'; var stored = null; try { stored = localStorage.getItem(k); } catch (e) {} var t = stored || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'); document.documentElement.setAttribute('data-theme', t); function updateThemeColor(th) { var meta = document.querySelector('meta[name="theme-color"]'); if (meta) meta.setAttribute('content', th === 'light' ? '#F5F7FA' : '#0A0C10'); } function a(th) { document.documentElement.setAttribute('data-theme', th); try { localStorage.setItem(k, th); } catch (e) {} updateThemeColor(th); document.querySelectorAll('.theme-toggle').forEach(function (b) { var i = b.querySelector('.theme-toggle-icon'), l = b.querySelector('.theme-toggle-label'); if (i) i.textContent = th === 'light' ? '🌙' : '☀️'; if (l) l.textContent = th === 'light' ? 'Dark mode' : 'Light mode'; }); } window.toggleTheme = function () { a(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }; window.applyTheme = a; updateThemeColor(t); })();</script>
    <meta name="description" content="DevBox — Sort, deduplicate, and transform lines of text">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Sorter — DevBox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"></noscript>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16.png">
    <link rel="apple-touch-icon" href="../assets/icon-192.png">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0A0C10">
    <meta property="og:title" content="Line Sorter — DevBox">
    <meta property="og:description" content="Sort, deduplicate, and transform lines of text">
    <meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--yellow-dim);color:var(--yellow)">≡</div>
                    <div>
                        <div class="tool-title">Line Sorter</div>
                        <div class="tool-desc">Sort, deduplicate, shuffle, and transform lines of text</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Input — one item per line</span>
                        <div class="panel-actions">
                            <button class="btn btn-ghost" onclick="lsSample()">Sample</button>
                            <button class="btn btn-ghost" onclick="document.getElementById('lsInput').value='';document.getElementById('lsOutput').textContent='';history.replaceState(null,'',location.pathname)">Clear</button>
                            <button class="share-btn" onclick="saveToURL({q:'lsInput'});navigator.clipboard.writeText(location.href).then(()=>showToast('🔗 Link copied!'))">⎘ Share</button>
                        </div>
                    </div>
                    <div class="drop-zone-global" id="lsDropZone" data-clickable>↑ Drop .txt file or click to upload</div>
                    <textarea id="lsInput" oninput="lsStats()" style="min-height:160px" placeholder="banana&#10;apple&#10;cherry&#10;apple&#10;date"></textarea>
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
                    <button class="btn btn-yellow" onclick="lsDo('sortaz')">A→Z</button>
                    <button class="btn btn-ghost" onclick="lsDo('sortza')">Z→A</button>
                    <button class="btn btn-ghost" onclick="lsDo('sortlen')">By length</button>
                    <button class="btn btn-ghost" onclick="lsDo('reverse')">Reverse</button>
                    <button class="btn btn-ghost" onclick="lsDo('shuffle')">Shuffle</button>
                    <button class="btn btn-ghost" onclick="lsDo('dedup')">Remove dupes</button>
                    <button class="btn btn-ghost" onclick="lsDo('trim')">Trim spaces</button>
                    <button class="btn btn-ghost" onclick="lsDo('empty')">Remove empty</button>
                    <button class="btn btn-ghost" onclick="lsDo('lower')">lowercase</button>
                    <button class="btn btn-ghost" onclick="lsDo('upper')">UPPERCASE</button>
                    <button class="btn btn-ghost" onclick="lsDo('number')">Add numbers</button>
                </div>
                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Output</span>
                        <span id="lsStatsEl" style="font-family:var(--mono);font-size:0.72rem;color:var(--text-dim)"></span>
                        <div class="panel-actions"><button class="btn btn-ghost" onclick="copy(document.getElementById('lsOutput').textContent)">⎘ Copy</button></div>
                    </div>
                    <div id="lsOutput" class="output-area" style="color:var(--yellow);white-space:pre-wrap;min-height:120px"></div>
                </div>
            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
    <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
    <script src="../assets/sidebar.js" defer></script>
    <script>
        function lsStats() {
            const lines = document.getElementById('lsInput').value.split('\n');
            const el = document.getElementById('lsStatsEl');
            if (el) el.textContent = `${lines.length} lines · ${lines.filter(x => x.trim()).length} non-empty`;
        }

        function lsDo(op) {
            let lines = document.getElementById('lsInput').value.split('\n');

            switch (op) {
                case 'sortaz': lines.sort((a, b) => a.localeCompare(b)); break;
                case 'sortza': lines.sort((a, b) => b.localeCompare(a)); break;
                case 'sortlen': lines.sort((a, b) => a.length - b.length); break;
                case 'reverse': lines.reverse(); break;
                case 'shuffle':
                    for (let i = lines.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [lines[i], lines[j]] = [lines[j], lines[i]];
                    }
                    break;
                case 'dedup': lines = [...new Set(lines)]; break;
                case 'trim': lines = lines.map(l => l.trim()); break;
                case 'empty': lines = lines.filter(l => l.trim()); break;
                case 'lower': lines = lines.map(l => l.toLowerCase()); break;
                case 'upper': lines = lines.map(l => l.toUpperCase()); break;
                case 'number': lines = lines.map((l, i) => `${i + 1}. ${l}`); break;
            }

            document.getElementById('lsOutput').textContent = lines.join('\n');
            const el = document.getElementById('lsStatsEl');
            if (el) el.textContent = `${lines.length} lines · ${lines.filter(x => x.trim()).length} non-empty`;
        }

        function lsSample() {
            document.getElementById('lsInput').value = [
                'banana',
                'apple',
                'cherry',
                'apple',
                'date',
                'banana',
                'elderberry',
                'fig',
                'grape',
                'banana'
            ].join('\n');
            lsStats();
        }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1800); }
        document.addEventListener('DOMContentLoaded', () => {
            initDropZone('#lsDropZone', ['.txt','text/plain'], (text) => {
                document.getElementById('lsInput').value = text;
                lsStats();
            });
            loadFromURL({ q: 'lsInput' }, lsStats);
        });
    </script>
</body>
</html>
