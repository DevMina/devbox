<script>(function(){var k='devbox_theme',t=localStorage.getItem(k)||'dark';document.documentElement.setAttribute('data-theme',t);function a(th){document.documentElement.setAttribute('data-theme',th);localStorage.setItem(k,th);document.querySelectorAll('.theme-toggle').forEach(function(b){var i=b.querySelector('.theme-toggle-icon'),l=b.querySelector('.theme-toggle-label');if(i)i.textContent=th==='light'?'🌙':'☀️';if(l)l.textContent=th==='light'?'Dark mode':'Light mode';});}window.toggleTheme=function(){a(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');};window.applyTheme=a;})();</script>
<style id="critical-css">
/* ════════════════════════════════════════════
   DevBox — Shared Design System
   ════════════════════════════════════════════ */

/* ── CSS Custom Properties ── */
:root {
  /* Background layers */
  --bg:       #0A0C10;
  --panel:    #0F1117;
  --surface:  #161B24;
  --surface2: #1C2330;

  /* Borders */
  --border:  #252D3D;
  --border2: #2E3A50;

  /* Text */
  --text:        #CDD6F0;
  --text-dim:    #7A8AAD;
  --text-bright: #EEF2FF;

  /* Accent palette */
  --green:       #3DFFA0;  --green-dim:  rgba(61,255,160,0.09);
  --blue:        #5BA4FF;  --blue-dim:   rgba(91,164,255,0.09);
  --orange:      #FF9A3C;  --orange-dim: rgba(255,154,60,0.09);
  --purple:      #B07EFF;  --purple-dim: rgba(176,126,255,0.09);
  --red:         #FF5E7A;  --red-dim:    rgba(255,94,122,0.09);
  --cyan:        #22D9F0;  --cyan-dim:   rgba(34,217,240,0.09);
  --yellow:      #FFD166;  --yellow-dim: rgba(255,209,102,0.09);
  --pink:        #FF79C6;  --pink-dim:   rgba(255,121,198,0.09);
  --teal:        #1EE8B8;  --teal-dim:   rgba(30,232,184,0.09);

  /* Typography */
  --font: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', 'Fira Code', monospace;

  /* Radii */
  --r:    10px;
  --r-sm:  6px;
  --r-xs:  4px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.45);

  /* Transitions */
  --transition: 0.15s ease;
  --transition-slow: 0.25s ease;

  /* Sidebar width */
  --sidebar-w: 228px;
  --sidebar-collapsed-w: 58px;
}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.app{display:flex;flex:1;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;}
[data-theme="light"] {
  --bg:       #F5F7FA;
  --panel:    #FFFFFF;
  --surface:  #EAEDF2;
  --surface2: #DDE1EA;

  --border:  #D1D7E3;
  --border2: #B8C0D2;

  --text:        #2D3452;
  --text-dim:    #566080;
  --text-bright: #111827;

  --green:       #006B43;  --green-dim:  rgba(0,168,107,0.1);
  --blue:        #2B6CB0;  --blue-dim:   rgba(43,108,176,0.1);
  --orange:      #9A4218;  --orange-dim: rgba(192,86,33,0.1);
  --purple:      #6B46C1;  --purple-dim: rgba(107,70,193,0.1);
  --red:         #C53030;  --red-dim:    rgba(197,48,48,0.1);
  --cyan:        #066678;  --cyan-dim:   rgba(9,135,160,0.1);
  --yellow:      #8A5A15;  --yellow-dim: rgba(183,121,31,0.1);
  --pink:        #97266D;  --pink-dim:   rgba(151,38,109,0.1);
  --teal:        #285E61;  --teal-dim:   rgba(40,94,97,0.1);
}
</style>
<meta name="description" content="DevBox — Test HTML at common responsive breakpoints">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakpoint Tester — DevBox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"></noscript>
<link rel="preload" href="../assets/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="../assets/style.css"></noscript>
<meta property="og:title" content="Breakpoint Tester — DevBox">
<meta property="og:description" content="Test HTML at common responsive breakpoints">
<meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--cyan-dim);color:var(--cyan)">📐</div>
                    <div>
                        <div class="tool-title">Breakpoint Tester</div>
                        <div class="tool-desc">Test any URL or HTML at common responsive breakpoints side by side</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">URL or paste HTML</span>
                        <div class="panel-actions">
                            <button class="btn btn-cyan" onclick="loadPreview()">▶ Preview</button>
                            <button class="btn btn-ghost" onclick="htmlSample()">Sample HTML</button>
                        </div>
                    </div>
                    <div class="input-row"><label>URL</label><input type="text" id="bpUrl" placeholder="https://example.com" style="font-family:var(--mono)"></div>
                    <div class="input-row" style="border-bottom:none"><label>or HTML</label><textarea id="bpHtml" placeholder="<h1>Hello</h1><p>Paste HTML to preview…</p>" style="min-height:80px;padding:10px 0;border:none;outline:none;resize:vertical"></textarea></div>
                </div>
                <div class="panel" style="margin-bottom:14px">
                    <div class="panel-bar"><span class="panel-label">Breakpoints</span></div>
                    <div id="bpGrid" style="padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap"></div>
                </div>
                <div id="bpPreviews" style="display:flex;gap:16px;overflow-x:auto;padding-bottom:8px;align-items:flex-start"></div>

            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
        <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
        <script src="../assets/sidebar.js" defer></script>
        <script>
            const BP = [
                { label: 'Mobile S', w: 320, h: 568, icon: '📱' },
                { label: 'Mobile M', w: 375, h: 667, icon: '📱' },
                { label: 'Mobile L', w: 425, h: 812, icon: '📱' },
                { label: 'Tablet', w: 768, h: 1024, icon: '📟' },
                { label: 'Laptop', w: 1024, h: 768, icon: '💻' },
                { label: 'Desktop', w: 1280, h: 800, icon: '🖥️' },
                { label: '4K', w: 1920, h: 1080, icon: '🖥️' },
            ];
            let activeBP = new Set([0, 1, 3, 4]);
            function initBP() {
                const grid = document.getElementById('bpGrid');
                grid.innerHTML = '';
                BP.forEach(({ label, w, h, icon }, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn ' + (activeBP.has(i) ? 'btn-cyan' : 'btn-ghost');
                    btn.innerHTML = `${icon} ${label} <span style="opacity:0.6;font-size:0.7rem">${w}×${h}</span>`;
                    btn.onclick = () => { activeBP.has(i) ? activeBP.delete(i) : activeBP.add(i); initBP(); loadPreview(); };
                    grid.appendChild(btn);
                });
            }
            function loadPreview() {
                const url = document.getElementById('bpUrl').value.trim();
                const html = document.getElementById('bpHtml').value.trim();
                if (!url && !html) { showToast('Enter a URL or paste HTML first'); return; }
                const previews = document.getElementById('bpPreviews'); previews.innerHTML = '';
                const scale = 0.45;
                [...activeBP].sort((a, b) => a - b).forEach(i => {
                    const { label, w, h } = BP[i];
                    const wrap = document.createElement('div');
                    wrap.style.cssText = 'flex-shrink:0;text-align:center;';
                    const label_el = document.createElement('div');
                    label_el.style.cssText = 'font-family:var(--mono);font-size:0.7rem;color:var(--text-dim);margin-bottom:6px';
                    label_el.textContent = `${BP[i].label} — ${w}×${h}`;
                    const outer = document.createElement('div');
                    outer.style.cssText = `width:${Math.round(w * scale)}px;height:${Math.round(h * scale)}px;overflow:hidden;border:1px solid var(--border);border-radius:6px;background:#fff;position:relative`;
                    const iframe = document.createElement('iframe');
                    iframe.style.cssText = `width:${w}px;height:${h}px;border:none;transform:scale(${scale});transform-origin:top left;pointer-events:none`;
                    if (url) { iframe.src = url; }
                    else { iframe.srcdoc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{font-family:sans-serif;margin:16px;}</style></head><body>${html}</body></html>`; }
                    outer.appendChild(iframe); wrap.appendChild(label_el); wrap.appendChild(outer); previews.appendChild(wrap);
                });
            }
            function htmlSample() { document.getElementById('bpUrl').value = ''; document.getElementById('bpHtml').value = '<style>*{box-sizing:border-box}body{font-family:sans-serif;margin:0;padding:0}header{background:#6c5ce7;color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}nav a{color:#fff;margin-left:16px;text-decoration:none}.hero{padding:48px 24px;text-align:center;background:#f8f9fa}h1{font-size:2.5rem;margin:0 0 16px}p{color:#666;max-width:500px;margin:0 auto}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:24px}.card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:20px}@media(max-width:600px){h1{font-size:1.6rem}nav a{display:none}}</style><header><strong>MyApp</strong><nav><a href="#">Home</a><a href="#">About</a><a href="#">Contact</a></nav></header><div class="hero"><h1>Welcome to MyApp</h1><p>A responsive layout demo. Resize the breakpoints above to see how the layout adapts.</p></div><div class="grid"><div class="card"><h3>Feature 1</h3><p>Description of the first feature goes here.</p></div><div class="card"><h3>Feature 2</h3><p>Description of the second feature goes here.</p></div><div class="card"><h3>Feature 3</h3><p>Description of the third feature goes here.</p></div></div>'; }
            document.addEventListener('DOMContentLoaded', initBP);
        </script>
</body>
</html>
