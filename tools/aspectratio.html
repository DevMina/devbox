<script>(function(){var k='devbox_theme',t=localStorage.getItem(k)||'dark';document.documentElement.setAttribute('data-theme',t);function a(th){document.documentElement.setAttribute('data-theme',th);localStorage.setItem(k,th);document.querySelectorAll('.theme-toggle').forEach(function(b){var i=b.querySelector('.theme-toggle-icon'),l=b.querySelector('.theme-toggle-label');if(i)i.textContent=th==='light'?'🌙':'☀️';if(l)l.textContent=th==='light'?'Dark mode':'Light mode';});}window.toggleTheme=function(){a(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');};window.applyTheme=a;})();</script>
<style id="critical-css">
/* ════════════════════════════════════════════

/* ── CSS Custom Properties ── */
:root {
  /* Background layers */
  --bg:       #0A0C10;
  --panel:    #0F1117;
  --surface:  #161B24;
  --surface2: #1C2330;

  /* Borders */
  --border:  #252D3D;
  --border2: #2E3A50;

  /* Text */
  --text:        #CDD6F0;
  --text-dim:    #7A8AAD;
  --text-bright: #EEF2FF;

  /* Accent palette */
  --green:       #3DFFA0;  --green-dim:  rgba(61,255,160,0.09);
  --blue:        #5BA4FF;  --blue-dim:   rgba(91,164,255,0.09);
  --orange:      #FF9A3C;  --orange-dim: rgba(255,154,60,0.09);
  --purple:      #B07EFF;  --purple-dim: rgba(176,126,255,0.09);
  --red:         #FF5E7A;  --red-dim:    rgba(255,94,122,0.09);
  --cyan:        #22D9F0;  --cyan-dim:   rgba(34,217,240,0.09);
  --yellow:      #FFD166;  --yellow-dim: rgba(255,209,102,0.09);
  --pink:        #FF79C6;  --pink-dim:   rgba(255,121,198,0.09);
  --teal:        #1EE8B8;  --teal-dim:   rgba(30,232,184,0.09);

  /* Typography */
  --font: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', 'Fira Code', monospace;

  /* Radii */
  --r:    10px;
  --r-sm:  6px;
  --r-xs:  4px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.45);

  /* Transitions */
  --transition: 0.15s ease;
  --transition-slow: 0.25s ease;

  /* Sidebar width */
  --sidebar-w: 228px;
  --sidebar-collapsed-w: 58px;
}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.app{display:flex;flex:1;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;}
[data-theme="light"] {
  --bg:       #F5F7FA;
  --panel:    #FFFFFF;
  --surface:  #EAEDF2;
  --surface2: #DDE1EA;

  --border:  #D1D7E3;
  --border2: #B8C0D2;

  --text:        #2D3452;
  --text-dim:    #566080;
  --text-bright: #111827;

  --green:       #006B43;  --green-dim:  rgba(0,168,107,0.1);
  --blue:        #2B6CB0;  --blue-dim:   rgba(43,108,176,0.1);
  --orange:      #9A4218;  --orange-dim: rgba(192,86,33,0.1);
  --purple:      #6B46C1;  --purple-dim: rgba(107,70,193,0.1);
  --red:         #C53030;  --red-dim:    rgba(197,48,48,0.1);
  --cyan:        #066678;  --cyan-dim:   rgba(9,135,160,0.1);
  --yellow:      #8A5A15;  --yellow-dim: rgba(183,121,31,0.1);
  --pink:        #97266D;  --pink-dim:   rgba(151,38,109,0.1);
  --teal:        #285E61;  --teal-dim:   rgba(40,94,97,0.1);
}
</style>
<meta name="description" content="DevBox — Calculate image dimensions from aspect ratios">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aspect Ratio Calculator — DevBox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"></noscript>
<link rel="preload" href="../assets/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="../assets/style.css"></noscript>
<meta property="og:title" content="Aspect Ratio Calculator — DevBox">
<meta property="og:description" content="Calculate image dimensions from aspect ratios">
<meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--cyan-dim);color:var(--cyan)">⬛</div>
                    <div>
                        <div class="tool-title">Aspect Ratio Calculator</div>
                        <div class="tool-desc">Calculate dimensions from ratios with visual preview</div>
                    </div>
                </div>

                <div class="two-col">
                    <div class="panel">
                        <div class="panel-bar"><span class="panel-label">Calculate dimensions</span></div>
                        <div class="input-row"><label>Width</label><input type="number" id="arW" placeholder="1920" oninput="arCalc('w')"></div>
                        <div class="input-row"><label>Height</label><input type="number" id="arH" placeholder="1080" oninput="arCalc('h')"></div>
                        <div class="input-row"><label>Ratio W</label><input type="number" id="arRW" placeholder="16" oninput="arCalc('r')"></div>
                        <div class="input-row"><label>Ratio H</label><input type="number" id="arRH" placeholder="9" oninput="arCalc('r')"></div>
                        <div class="hash-grid" id="arResult"></div>
                    </div>
                    <div class="panel">
                        <div class="panel-bar"><span class="panel-label">Common ratios — click to load</span></div>
                        <div id="arPresets" style="padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px"></div>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-bar"><span class="panel-label">Visual preview</span></div>
                    <div style="padding:16px;display:flex;justify-content:center;align-items:center;min-height:160px">
                        <div id="arVisual" style="background:var(--surface2);border:2px solid var(--border);border-radius:6px;transition:all 0.3s;max-width:100%;display:flex;align-items:center;justify-content:center">
                            <span id="arVisualLabel" style="font-family:var(--mono);font-size:0.75rem;color:var(--text-dim)">16:9</span>
                        </div>
                    </div>
                </div>
            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
        <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
        <script src="../assets/sidebar.js" defer></script>
        <script>
            const AR_PRESETS = [['16:9', '1920', '1080'], ['4:3', '1600', '1200'], ['1:1', '1080', '1080'], ['21:9', '2560', '1080'], ['9:16', '1080', '1920'], ['3:2', '1500', '1000'], ['2:1', '2000', '1000'], ['4:5', '1080', '1350'], ['3:4', '900', '1200'], ['5:4', '1280', '1024']];
            function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
            function arCalc(changed) { const w = parseFloat(document.getElementById('arW').value), h = parseFloat(document.getElementById('arH').value), rw = parseFloat(document.getElementById('arRW').value), rh = parseFloat(document.getElementById('arRH').value); let resW = w, resH = h; if (changed === 'w' && w && rw && rh) { resH = Math.round(w / rw * rh); document.getElementById('arH').value = resH; } else if (changed === 'h' && h && rw && rh) { resW = Math.round(h / rh * rw); document.getElementById('arW').value = resW; } else if (changed === 'r' && rw && rh && w) { resH = Math.round(w / rw * rh); document.getElementById('arH').value = resH; } if (resW && resH) { const g = gcd(Math.round(resW), Math.round(resH)), ratio = `${Math.round(resW) / g}:${Math.round(resH) / g}`, dec = (resW / resH).toFixed(4); document.getElementById('arResult').innerHTML = `<div class="hash-row"><div class="hash-algo">Ratio</div><div class="hash-val" style="color:var(--cyan)">${ratio} (${dec}:1)</div></div><div class="hash-row"><div class="hash-algo">Width</div><div class="hash-val">${Math.round(resW)}px</div></div><div class="hash-row"><div class="hash-algo">Height</div><div class="hash-val">${Math.round(resH)}px</div></div><div class="hash-row"><div class="hash-algo">Megapixels</div><div class="hash-val" style="color:var(--text-dim)">${(resW * resH / 1e6).toFixed(2)} MP</div></div>`; const scale = Math.min(300 / resW, 180 / resH), vw = Math.round(resW * scale), vh = Math.round(resH * scale), vis = document.getElementById('arVisual'); vis.style.width = vw + 'px'; vis.style.height = vh + 'px'; document.getElementById('arVisualLabel').textContent = ratio; } }
            function arLoad(w, h) { document.getElementById('arW').value = w; document.getElementById('arH').value = h; const g = gcd(parseInt(w), parseInt(h)); document.getElementById('arRW').value = parseInt(w) / g; document.getElementById('arRH').value = parseInt(h) / g; arCalc('w'); }
            function initPresets() { const c = document.getElementById('arPresets'); AR_PRESETS.forEach(([l, w, h]) => { const btn = document.createElement('button'); btn.className = 'btn btn-ghost'; btn.style.fontSize = '0.72rem'; btn.textContent = `${l} (${w}×${h})`; btn.onclick = () => arLoad(w, h); c.appendChild(btn); }); }
            document.addEventListener('DOMContentLoaded', () => { initPresets(); arLoad('1920', '1080'); });
        </script>
</body>
</html>
