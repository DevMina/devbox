<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="DevBox — Beautify and minify SQL queries">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Formatter — DevBox</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<meta property="og:title" content="SQL Formatter — DevBox">
<meta property="og:description" content="Beautify and minify SQL queries">
<meta property="og:type" content="website">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="content" style="min-width:0">
    <div class="tool-header">
      <div class="tool-icon" style="background:var(--orange-dim);color:var(--orange)">SQL</div>
      <div>
        <div class="tool-title">SQL Formatter</div>
        <div class="tool-desc">Beautify and minify SQL queries with keyword highlighting</div>
      </div>
    </div>
    
<div class="panel">
  <div class="panel-bar">
    <span class="panel-label">Input SQL</span>
    <div class="panel-actions">
      <button class="btn btn-orange" onclick="sqlFormat()">⇄ Format</button>
      <button class="btn btn-ghost" onclick="sqlMinify()">⇉ Minify</button>
      <button class="btn btn-ghost" onclick="sqlSample()">Sample</button>
      <button class="btn btn-ghost" onclick="document.getElementById('sqlInput').value='';document.getElementById('sqlOutput').innerHTML=''">Clear</button>
    </div>
  </div>
  <textarea id="sqlInput" style="min-height:160px" placeholder="SELECT * FROM users WHERE active=1 ORDER BY created_at DESC;"></textarea>
</div>
<div class="panel">
  <div class="panel-bar"><span class="panel-label">Output</span><div class="panel-actions"><button class="btn btn-ghost" onclick="copy(document.getElementById('sqlOutput').innerText)">⎘ Copy</button></div></div>
  <div id="sqlOutput" class="output-area" style="min-height:160px;white-space:pre-wrap;line-height:1.8;"></div>
</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="../assets/shared.js"></script>
<script src="../assets/sidebar.js"></script>
<script>
const SQL_KW=['SELECT','FROM','WHERE','AND','OR','NOT','IN','IS','NULL','ORDER BY','GROUP BY','HAVING','LIMIT','OFFSET','JOIN','LEFT JOIN','RIGHT JOIN','INNER JOIN','OUTER JOIN','ON','AS','DISTINCT','COUNT','SUM','AVG','MIN','MAX','INSERT INTO','VALUES','UPDATE','SET','DELETE FROM','CREATE TABLE','DROP TABLE','ALTER TABLE','ADD','COLUMN','PRIMARY KEY','FOREIGN KEY','REFERENCES','INDEX','UNIQUE','DEFAULT','NOT NULL','AUTO_INCREMENT','BETWEEN','LIKE','EXISTS','UNION','ALL'];
function sqlFormat(){let sql=document.getElementById('sqlInput').value.trim();if(!sql)return;sql=sql.replace(/\s+/g,' ');['SELECT','FROM','WHERE','AND','OR','ORDER BY','GROUP BY','HAVING','LIMIT','OFFSET','LEFT JOIN','RIGHT JOIN','INNER JOIN','OUTER JOIN','JOIN','ON','UNION','INSERT INTO','VALUES','UPDATE','SET','DELETE FROM'].forEach(kw=>{sql=sql.replace(new RegExp('\b'+kw+'\b','gi'),'
'+kw);});sql=sql.replace(/
(AND|OR)/gi,'
  $1');SQL_KW.forEach(kw=>{sql=sql.replace(new RegExp('\b'+kw+'\b','gi'),kw);});document.getElementById('sqlOutput').innerHTML=highlightSql(sql.trim());}
function sqlMinify(){let sql=document.getElementById('sqlInput').value.replace(/\s+/g,' ').trim();SQL_KW.forEach(kw=>{sql=sql.replace(new RegExp('\b'+kw+'\b','gi'),kw);});document.getElementById('sqlOutput').innerHTML=highlightSql(sql);}
function highlightSql(sql){let h=escHtml(sql);SQL_KW.forEach(kw=>{h=h.replace(new RegExp('\b'+kw+'\b','g'),`<span style="color:var(--blue);font-weight:600">${kw}</span>`);});h=h.replace(/'([^']*)'/g,`<span style="color:var(--green)">'$1'</span>`);h=h.replace(/(\d+)/g,`<span style="color:var(--orange)">$1</span>`);h=h.replace(/--.*/g,m=>`<span style="color:var(--text-dim);font-style:italic">${m}</span>`);return h;}
function sqlSample(){document.getElementById('sqlInput').value="SELECT u.id, u.name, u.email, COUNT(o.id) AS order_count FROM users u LEFT JOIN orders o ON u.id = o.user_id WHERE u.active = 1 AND u.created_at > '2023-01-01' GROUP BY u.id HAVING order_count > 0 ORDER BY order_count DESC LIMIT 50;";}
</script>
</body>
</html>
