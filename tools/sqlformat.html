<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="DevBox — Beautify and minify SQL queries">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Formatter — DevBox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"></noscript>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16.png">
    <link rel="apple-touch-icon" href="../assets/icon-192.png">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0A0C10">
    <meta property="og:title" content="SQL Formatter — DevBox">
    <meta property="og:description" content="Beautify and minify SQL queries">
    <meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--orange-dim);color:var(--orange)">SQL</div>
                    <div>
                        <div class="tool-title">SQL Formatter</div>
                        <div class="tool-desc">Beautify and minify SQL queries with keyword highlighting</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Input SQL</span>
                        <div class="panel-actions">
                            <button class="btn btn-orange" onclick="sqlFormat()">⇄ Format</button>
                            <button class="btn btn-ghost" onclick="sqlMinify()">⇉ Minify</button>
                            <button class="btn btn-ghost" onclick="sqlSample()">Sample</button>
                            <button class="btn btn-ghost" onclick="document.getElementById('sqlInput').value='';document.getElementById('sqlOutput').innerHTML='';history.replaceState(null,'',location.pathname)">Clear</button>
                            <button class="share-btn" onclick="saveToURL({q:'sqlInput'});navigator.clipboard.writeText(location.href).then(()=>showToast('🔗 Link copied!'))">⎘ Share</button>
                        </div>
                    </div>
                    <div class="drop-zone-global" id="sqlDropZone" data-clickable>↑ Drop .sql file or click to upload</div>
                    <textarea id="sqlInput" style="min-height:160px" placeholder="SELECT * FROM users WHERE active=1 ORDER BY created_at DESC;"></textarea>
                </div>
                <div class="panel">
                    <div class="panel-bar"><span class="panel-label">Output</span><div class="panel-actions"><button class="btn btn-ghost" onclick="copy(document.getElementById('sqlOutput').innerText)">⎘ Copy</button></div></div>
                    <pre id="sqlOutput"
                         class="output-area"
                         style="min-height:160px;white-space:pre-wrap;line-height:1.8;margin:0;"></pre>
                </div>
            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
    <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
    <script src="../assets/sidebar.js" defer></script>
    <script>
        const SQL_KW = [
            'SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'NOT', 'IN', 'IS', 'NULL',
            'ORDER BY', 'GROUP BY', 'HAVING', 'LIMIT', 'OFFSET',
            'LEFT JOIN', 'RIGHT JOIN', 'INNER JOIN', 'OUTER JOIN', 'JOIN',
            'ON', 'AS', 'DISTINCT',
            'COUNT', 'SUM', 'AVG', 'MIN', 'MAX',
            'INSERT INTO', 'VALUES',
            'UPDATE', 'SET',
            'DELETE FROM',
            'CREATE TABLE', 'DROP TABLE', 'ALTER TABLE',
            'ADD', 'COLUMN',
            'PRIMARY KEY', 'FOREIGN KEY', 'REFERENCES',
            'INDEX', 'UNIQUE', 'DEFAULT', 'NOT NULL',
            'AUTO_INCREMENT',
            'BETWEEN', 'LIKE', 'EXISTS',
            'UNION', 'ALL'
        ];

        function escapeRegExp(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function sqlFormat() {
            let sql = document.getElementById('sqlInput').value.trim();

            if (!sql) return;

            sql = sql.replace(/\s+/g, ' ');
            sql = sql.replace(/,\s*/g, ',\n    ');
            const breaks = [
                'LEFT JOIN',
                'RIGHT JOIN',
                'INNER JOIN',
                'OUTER JOIN',
                'GROUP BY',
                'ORDER BY',
                'INSERT INTO',
                'DELETE FROM',
                'SELECT',
                'FROM',
                'WHERE',
                'JOIN',
                'ON',
                'HAVING',
                'LIMIT',
                'UNION',
                'UPDATE',
                'SET',
                'VALUES'
            ];

            breaks.forEach(kw => {
                sql = sql.replace(
                    new RegExp(`\\b${escapeRegExp(kw)}\\b`, 'gi'),
                    '\n' + kw.toUpperCase()
                );
            });

            sql = sql.replace(/\bAND\b/gi, '\n    AND');
            sql = sql.replace(/\bOR\b/gi, '\n    OR');

            document.getElementById('sqlOutput').innerHTML =
                highlightSql(sql.trim());
        }

        function sqlMinify() {
            let sql = document.getElementById('sqlInput').value;

            if (!sql.trim()) return;

            sql = sql.replace(/\s+/g, ' ').trim();

            document.getElementById('sqlOutput').innerHTML =
                highlightSql(sql);
        }

        function highlightSql(sql) {
            let h = escHtml(sql);

            // Strings
            h = h.replace(
                /'([^']*)'/g,
                '<span style="color:var(--green)">\'$1\'</span>'
            );

            // Numbers
            h = h.replace(
                /\b(\d+)\b/g,
                '<span style="color:var(--orange)">$1</span>'
            );

            // Keywords (longest first)
            [...SQL_KW]
                .sort((a, b) => b.length - a.length)
                .forEach(kw => {
                    h = h.replace(
                        new RegExp(`\\b${escapeRegExp(kw)}\\b`, 'gi'),
                        `<span style="color:var(--blue);font-weight:600">${kw}</span>`
                    );
                });

            return h;
        }

        function sqlSample() {
            document.getElementById('sqlInput').value =
                `SELECT u.id, u.name, u.email, COUNT(o.id) AS order_count
FROM users u
LEFT JOIN orders o ON u.id = o.user_id
WHERE u.active = 1
AND u.created_at > '2023-01-01'
GROUP BY u.id
HAVING order_count > 0
ORDER BY order_count DESC
LIMIT 50;`;
        }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1800); }
        document.addEventListener('DOMContentLoaded', () => {
            initDropZone('#sqlDropZone', ['.sql','text/sql'], (text) => {
                document.getElementById('sqlInput').value = text;
                sqlFormat();
            });
            loadFromURL({ q: 'sqlInput' }, sqlFormat);
        });
    </script>
</body>
</html>
