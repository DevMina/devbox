<style id="critical-css">
/* ════════════════════════════════════════════

/* ── CSS Custom Properties ── */
:root {
  /* Background layers */
  --bg:       #0A0C10;
  --panel:    #0F1117;
  --surface:  #161B24;
  --surface2: #1C2330;

  /* Borders */
  --border:  #252D3D;
  --border2: #2E3A50;

  /* Text */
  --text:        #CDD6F0;
  --text-dim:    #7A8AAD;
  --text-bright: #EEF2FF;

  /* Accent palette */
  --green:       #3DFFA0;  --green-dim:  rgba(61,255,160,0.09);
  --blue:        #5BA4FF;  --blue-dim:   rgba(91,164,255,0.09);
  --orange:      #FF9A3C;  --orange-dim: rgba(255,154,60,0.09);
  --purple:      #B07EFF;  --purple-dim: rgba(176,126,255,0.09);
  --red:         #FF5E7A;  --red-dim:    rgba(255,94,122,0.09);
  --cyan:        #22D9F0;  --cyan-dim:   rgba(34,217,240,0.09);
  --yellow:      #FFD166;  --yellow-dim: rgba(255,209,102,0.09);
  --pink:        #FF79C6;  --pink-dim:   rgba(255,121,198,0.09);
  --teal:        #1EE8B8;  --teal-dim:   rgba(30,232,184,0.09);

  /* Typography */
  --font: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', 'Fira Code', monospace;

  /* Radii */
  --r:    10px;
  --r-sm:  6px;
  --r-xs:  4px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.45);

  /* Transitions */
  --transition: 0.15s ease;
  --transition-slow: 0.25s ease;

  /* Sidebar width */
  --sidebar-w: 228px;
  --sidebar-collapsed-w: 58px;
}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.app{display:flex;flex:1;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;}
[data-theme="light"] {
  --bg:       #F5F7FA;
  --panel:    #FFFFFF;
  --surface:  #EAEDF2;
  --surface2: #DDE1EA;

  --border:  #D1D7E3;
  --border2: #B8C0D2;

  --text:        #2D3452;
  --text-dim:    #566080;
  --text-bright: #111827;

  --green:       #006B43;  --green-dim:  rgba(0,168,107,0.1);
  --blue:        #2B6CB0;  --blue-dim:   rgba(43,108,176,0.1);
  --orange:      #9A4218;  --orange-dim: rgba(192,86,33,0.1);
  --purple:      #6B46C1;  --purple-dim: rgba(107,70,193,0.1);
  --red:         #C53030;  --red-dim:    rgba(197,48,48,0.1);
  --cyan:        #066678;  --cyan-dim:   rgba(9,135,160,0.1);
  --yellow:      #8A5A15;  --yellow-dim: rgba(183,121,31,0.1);
  --pink:        #97266D;  --pink-dim:   rgba(151,38,109,0.1);
  --teal:        #285E61;  --teal-dim:   rgba(40,94,97,0.1);
}

<meta name="description" content="DevBox — Test regular expressions with live match highlighting">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regex Tester — DevBox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"></noscript>
<link rel="preload" href="../assets/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="../assets/style.css"></noscript>
<meta property="og:title" content="Regex Tester — DevBox">
<meta property="og:description" content="Test regular expressions with live match highlighting">
<meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--red-dim);color:var(--red)">.*</div>
                    <div>
                        <div class="tool-title">Regex Tester</div>
                        <div class="tool-desc">Test regular expressions with live match highlighting and capture groups</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Pattern</span>
                        <div class="panel-actions">
                            <span id="regexStatus"></span>
                            <label class="check-row" style="margin:0"><input type="checkbox" id="regexGlobal" checked onchange="regexTest()"> g</label>
                            <label class="check-row" style="margin:0"><input type="checkbox" id="regexInsens" onchange="regexTest()"> i</label>
                            <label class="check-row" style="margin:0"><input type="checkbox" id="regexMulti" onchange="regexTest()"> m</label>
                        </div>
                    </div>
                    <div class="input-row" style="border-bottom:none;">
                        <span style="font-family:var(--mono);font-size:1rem;color:var(--text-dim)">/</span>
                        <input type="text" id="regexPattern" placeholder="(\w+)@(\w+\.\w+)" oninput="regexTest()" style="flex:1">
                        <span style="font-family:var(--mono);font-size:1rem;color:var(--text-dim)">/</span>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-bar"><span class="panel-label">Test string</span><span id="matchCount" style="font-family:var(--mono);font-size:0.72rem;color:var(--text-dim)"></span></div>
                    <textarea id="regexInput" placeholder="user@example.com, hello@world.org" oninput="regexTest()" style="min-height:100px;"></textarea>
                </div>
                <div class="panel">
                    <div class="panel-bar"><span class="panel-label">Highlighted matches</span></div>
                    <div id="regexOutput" class="output-area" style="font-size:0.85rem;line-height:1.7;word-break:break-word;white-space:pre-wrap;"></div>
                </div>
                <div class="panel" id="regexGroupPanel" style="display:none">
                    <div class="panel-bar"><span class="panel-label">Capture groups</span></div>
                    <div id="regexGroups" class="output-area" style="color:var(--yellow);font-size:0.8rem;"></div>
                </div>

            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
        <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
        <script src="../assets/sidebar.js" defer></script>
        <script>
            function regexTest() { const pat = document.getElementById('regexPattern').value, str = document.getElementById('regexInput').value, g = document.getElementById('regexGlobal').checked, i = document.getElementById('regexInsens').checked, m = document.getElementById('regexMulti').checked, out = document.getElementById('regexOutput'), cnt = document.getElementById('matchCount'), st = document.getElementById('regexStatus'), gp = document.getElementById('regexGroupPanel'); if (!pat) { out.innerHTML = escHtml(str); cnt.textContent = ''; st.innerHTML = ''; gp.style.display = 'none'; return; } let rx; try { rx = new RegExp(pat, (g ? 'g' : '') + (i ? 'i' : '') + (m ? 'm' : '')); st.innerHTML = '<span class="status-badge badge-ok">✓</span>'; } catch (e) { st.innerHTML = '<span class="status-badge badge-err">Invalid regex</span>'; out.innerHTML = escHtml(str); cnt.textContent = ''; gp.style.display = 'none'; return; } const matches = [...str.matchAll(new RegExp(pat, 'g' + (i ? 'i' : '') + (m ? 'm' : '')))]; cnt.textContent = matches.length ? matches.length + ' match' + (matches.length !== 1 ? 'es' : '') : 'No matches'; let result = '', last = 0; const hRx = new RegExp(pat, 'g' + (i ? 'i' : '') + (m ? 'm' : '')); let match; while ((match = hRx.exec(str)) !== null) { result += escHtml(str.slice(last, match.index)); result += `<span class="regex-match">${escHtml(match[0])}</span>`; last = hRx.lastIndex; if (!g) break; } result += escHtml(str.slice(last)); out.innerHTML = result; const hasGroups = matches.some(m => m.length > 1); if (hasGroups) { gp.style.display = ''; document.getElementById('regexGroups').textContent = matches.map((m, i) => `Match ${i + 1}: ${m.slice(1).map((g, j) => 'Group ' + (j + 1) + ': "' + g + '"').join(', ')}`).join('\n'); } else gp.style.display = 'none'; }
        </script>
</body>
