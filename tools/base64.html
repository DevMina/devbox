<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>(function () { var k = 'devbox_theme'; var stored = null; try { stored = localStorage.getItem(k); } catch (e) {} var t = stored || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'); document.documentElement.setAttribute('data-theme', t); function updateThemeColor(th) { var meta = document.querySelector('meta[name="theme-color"]'); if (meta) meta.setAttribute('content', th === 'light' ? '#F5F7FA' : '#0A0C10'); } function a(th) { document.documentElement.setAttribute('data-theme', th); try { localStorage.setItem(k, th); } catch (e) {} updateThemeColor(th); document.querySelectorAll('.theme-toggle').forEach(function (b) { var i = b.querySelector('.theme-toggle-icon'), l = b.querySelector('.theme-toggle-label'); if (i) i.textContent = th === 'light' ? '🌙' : '☀️'; if (l) l.textContent = th === 'light' ? 'Dark mode' : 'Light mode'; }); } window.toggleTheme = function () { a(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }; window.applyTheme = a; updateThemeColor(t); })();</script>
    <meta name="description" content="DevBox — Encode and decode Base64 text">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder/Decoder — DevBox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"></noscript>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16.png">
    <link rel="apple-touch-icon" href="../assets/icon-192.png">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0A0C10">
    <meta property="og:title" content="Base64 Encoder/Decoder — DevBox">
    <meta property="og:description" content="Encode and decode Base64 text">
    <meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--blue-dim);color:var(--blue)">B64</div>
                    <div>
                        <div class="tool-title">Base64 Encoder/Decoder</div>
                        <div class="tool-desc">Encode text to Base64 and decode it back</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Input</span>
                        <div class="panel-actions">
                            <button class="btn btn-blue" onclick="b64Encode()">Encode →</button>
                            <button class="btn btn-ghost" onclick="b64Decode()">← Decode</button>
                            <button class="btn btn-ghost" onclick="b64Clear()">Clear</button>
                            <button class="share-btn" onclick="saveToURL({q:'b64Input'});navigator.clipboard.writeText(location.href).then(()=>showToast('🔗 Link copied!'))">⎘ Share</button>
                        </div>
                    </div>
                    <div class="drop-zone-global" id="b64DropZone" data-clickable>↑ Drop any text file or click to upload</div>
                    <textarea id="b64Input" placeholder="Enter text to encode, or Base64 to decode…"></textarea>
                </div>
                <div class="panel">
                    <div class="panel-bar">
                        <span class="panel-label">Output</span>
                        <div class="panel-actions">
                            <button class="btn btn-ghost" onclick="copy(document.getElementById('b64Output').textContent)">⎘ Copy</button>
                            <button class="btn btn-ghost" onclick="b64Swap()">⇅ Swap</button>
                        </div>
                    </div>
                    <div id="b64Output" class="output-area" style="color:var(--blue)"></div>
                </div>

            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>

        </main><!-- /content-wrap -->
    </div>
    <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
    <script src="../assets/sidebar.js" defer></script>
    <script>
        function b64Encode() { try { document.getElementById('b64Output').textContent = btoa(unescape(encodeURIComponent(document.getElementById('b64Input').value))); } catch (e) { document.getElementById('b64Output').textContent = 'Error: ' + e.message; } }
        function b64Decode() { try { document.getElementById('b64Output').textContent = decodeURIComponent(escape(atob(document.getElementById('b64Input').value.trim()))); } catch (e) { document.getElementById('b64Output').textContent = 'Error: invalid Base64'; } }
        function b64Swap() { const o = document.getElementById('b64Output').textContent; document.getElementById('b64Input').value = o; document.getElementById('b64Output').textContent = ''; }
        function b64Clear() { document.getElementById('b64Input').value = ''; document.getElementById('b64Output').textContent = ''; history.replaceState(null,'',location.pathname); }
        document.addEventListener('DOMContentLoaded', () => {
            initDropZone('#b64DropZone', [], (text) => { document.getElementById('b64Input').value = text; });
            loadFromURL({ q: 'b64Input' });
        });
    </script>
</body>
</html>
