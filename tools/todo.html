<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script>(function () { var k = 'devbox_theme', t = localStorage.getItem(k) || 'dark'; document.documentElement.setAttribute('data-theme', t); function a(th) { document.documentElement.setAttribute('data-theme', th); localStorage.setItem(k, th); document.querySelectorAll('.theme-toggle').forEach(function (b) { var i = b.querySelector('.theme-toggle-icon'), l = b.querySelector('.theme-toggle-label'); if (i) i.textContent = th === 'light' ? '🌙' : '☀️'; if (l) l.textContent = th === 'light' ? 'Dark mode' : 'Light mode'; }); } window.toggleTheme = function () { a(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }; window.applyTheme = a; })();</script>
    <meta name="description" content="DevBox — To-Do List to track, update and manage your tasks">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List — DevBox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload"
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
        as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap">
    </noscript>
    <link rel="stylesheet" href="../assets/style.css">
    <meta property="og:title" content="To-Do List — DevBox">
    <meta property="og:description" content="Track, update and manage your tasks">
    <meta property="og:type" content="website">
</head>

<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content" style="min-width:0">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--teal-dim,rgba(0,200,180,0.12));color:var(--teal)">✅
                    </div>
                    <div>
                        <div class="tool-title">To-Do List</div>
                        <div class="tool-desc">Add, update, complete and remove tasks — saved locally in your browser
                        </div>
                    </div>
                </div>

                <!-- Add task panel -->
                <div class="panel" style="margin-bottom:14px">
                    <div class="panel-bar"><span class="panel-label">New task</span></div>
                    <div style="padding:12px 14px;display:flex;flex-direction:column;gap:10px">
                        <input type="text" id="todoInput" placeholder="What needs to be done?" maxlength="300"
                            style="font-family:var(--sans);font-size:0.9rem;padding:10px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);outline:none;width:100%;box-sizing:border-box"
                            onkeydown="if(event.key==='Enter')addTodo()">
                        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
                            <select id="todoPriority"
                                style="font-family:var(--mono);font-size:0.78rem;padding:6px 10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);outline:none;cursor:pointer">
                                <option value="high">🔴 High priority</option>
                                <option value="med">🟡 Medium priority</option>
                                <option value="low">🟢 Low priority</option>
                            </select>
                            <input type="date" id="todoDate"
                                style="font-family:var(--mono);font-size:0.78rem;padding:6px 10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);outline:none;cursor:pointer">
                            <input type="text" id="todoTag" placeholder="Tag (optional)" maxlength="30"
                                style="font-family:var(--mono);font-size:0.78rem;padding:6px 10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);outline:none;width:140px"
                                onkeydown="if(event.key==='Enter')addTodo()">
                            <button class="btn btn-teal" onclick="addTodo()" style="margin-left:auto;padding:7px 20px">+
                                Add task</button>
                        </div>
                    </div>
                </div>

                <!-- Stats + filter row -->
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px">
                    <span id="todoStats" style="font-family:var(--mono);font-size:0.72rem;color:var(--text-dim)"></span>
                    <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">
                        <button class="btn btn-ghost filter-btn active" id="fAll"
                            onclick="setFilter('all')">All</button>
                        <button class="btn btn-ghost filter-btn" id="fActive"
                            onclick="setFilter('active')">Active</button>
                        <button class="btn btn-ghost filter-btn" id="fDone" onclick="setFilter('done')">Done</button>
                    </div>
                    <button class="btn btn-ghost" style="font-size:0.72rem;padding:4px 10px;color:var(--text-dim)"
                        onclick="clearDone()">Clear done</button>
                    <button class="btn btn-ghost" style="font-size:0.72rem;padding:4px 10px;color:var(--text-dim)"
                        onclick="exportTodos()">Export</button>
                    <input type="file" id="importFile" hidden onchange="importTodos(event)">
                    <button class="btn btn-ghost" style="font-size:0.72rem;padding:4px 10px;color:var(--text-dim)"
                        onclick="document.getElementById('importFile').click()">Import</button>
                </div>

                <!-- Tag filter -->
                <div id="tagFilterRow" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px"></div>

                <!-- Progress bar -->
                <div class="progress-bar-wrap" id="progressWrap" style="display:none">
                    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
                </div>

                <!-- Task list -->
                <div class="panel" id="todoList"></div>

            </div>
            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved.
            </footer>
        </main>
    </div>
    <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
    <script src="../assets/sidebar.js" defer></script>
    <script>
        const STORE_KEY = 'devbox_todos';
        let todos = [];
        let filter = 'all';
        let activeTag = '';
        let editingId = null;

        function load() {
            try { todos = JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch (e) { todos = []; }
        }
        function save() { localStorage.setItem(STORE_KEY, JSON.stringify(todos)); }

        function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

        function fmtDate(ts) {
            const d = new Date(ts);
            return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        }

        function addTodo() {
            const text = document.getElementById('todoInput').value.trim();
            if (!text) { showToast('Type something first'); return; }
            const priority = document.getElementById('todoPriority').value;
            const tag = document.getElementById('todoTag').value.trim().toLowerCase();
            const date = document.getElementById('todoDate').value;
            todos.unshift({ id: uid(), text, done: false, priority, tag, date, created: Date.now(), updated: Date.now() });
            save();
            document.getElementById('todoInput').value = '';
            document.getElementById('todoTag').value = '';
            document.getElementById('todoDate').value = '';
            render();
            showToast('Task added');
        }

        function toggleDone(id) {
            const t = todos.find(x => x.id === id);
            if (!t) return;
            t.done = !t.done;
            t.updated = Date.now();
            save(); render();
        }

        function removeTodo(id) {
            todos = todos.filter(x => x.id !== id);
            save(); render();
            showToast('Task removed');
        }

        function startEdit(id) {
            editingId = id;
            render();
            const ta = document.getElementById('edit-' + id);
            if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
        }

        function saveEdit(id) {
            const ta = document.getElementById('edit-' + id);
            if (!ta) return;
            const newText = ta.value.trim();
            if (!newText) { showToast('Task cannot be empty'); return; }
            const t = todos.find(x => x.id === id);
            if (t) { t.text = newText; t.updated = Date.now(); save(); }
            editingId = null;
            render();
            showToast('Task updated');
        }

        function cancelEdit() { editingId = null; render(); }

        function clearDone() {
            const n = todos.filter(x => x.done).length;
            if (!n) { showToast('No completed tasks to clear'); return; }
            todos = todos.filter(x => !x.done);
            save(); render();
            showToast(n + ' task' + (n > 1 ? 's' : '') + ' cleared');
        }

        function exportTodos() {
            let blob = new Blob([JSON.stringify(todos, null, 2)], { type: "application/json" });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "devbox-todos.json";
            link.click();
            showToast('Tasks exported');
        }

        function importTodos(e) {
            let file = e.target.files[0];
            if (!file) return;
            let reader = new FileReader();
            reader.onload = function () {
                try {
                    const imported = JSON.parse(reader.result);
                    if (Array.isArray(imported)) {
                        todos = imported;
                        save();
                        render();
                        showToast('Tasks imported');
                    } else {
                        showToast('Invalid file format');
                    }
                } catch (err) {
                    showToast('Error importing tasks');
                }
            };
            reader.readAsText(file);
        }

        function setFilter(f) {
            filter = f;
            ['All', 'Active', 'Done'].forEach(n => {
                const el = document.getElementById('f' + n);
                if (el) el.classList.toggle('active', f === n.toLowerCase());
            });
            render();
        }

        function setTag(tag) {
            activeTag = (activeTag === tag) ? '' : tag;
            render();
        }

        function priorityClass(p) { return p === 'high' ? 'p-high' : p === 'low' ? 'p-low' : 'p-med'; }

        function escHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function render() {
            // Stats
            const total = todos.length, done = todos.filter(x => x.done).length, active = total - done;
            document.getElementById('todoStats').textContent = total
                ? active + ' remaining · ' + done + ' done'
                : 'No tasks yet';

            // Progress
            const pw = document.getElementById('progressWrap');
            const pf = document.getElementById('progressFill');
            if (total > 0) {
                pw.style.display = '';
                pf.style.width = Math.round((done / total) * 100) + '%';
            } else {
                pw.style.display = 'none';
            }

            // Tag cloud
            const allTags = [...new Set(todos.map(t => t.tag).filter(Boolean))].sort();
            const tagRow = document.getElementById('tagFilterRow');
            if (allTags.length) {
                tagRow.innerHTML = '<span style="font-size:0.72rem;color:var(--text-dim);font-family:var(--mono);margin-right:2px">Tags:</span>'
                    + allTags.map(tag =>
                        '<button class="btn btn-ghost filter-btn' + (activeTag === tag ? ' active' : '') + '" style="font-size:0.7rem;padding:3px 10px" onclick="setTag(\'' + escHtml(tag) + '\')">' + escHtml(tag) + '</button>'
                    ).join('');
            } else {
                tagRow.innerHTML = '';
            }

            // Filter todos
            let visible = todos.filter(t => {
                if (filter === 'active' && t.done) return false;
                if (filter === 'done' && !t.done) return false;
                if (activeTag && t.tag !== activeTag) return false;
                return true;
            });

            const list = document.getElementById('todoList');

            if (!visible.length) {
                list.innerHTML = '<div class="empty-state"><div class="icon">'
                    + (filter === 'done' ? '🎉' : filter === 'active' ? '✨' : '📋')
                    + '</div>'
                    + (filter === 'done' ? 'No completed tasks yet' : filter === 'active' ? 'All tasks are done!' : 'No tasks yet — add one above')
                    + '</div>';
                return;
            }

            list.innerHTML = visible.map(t => {
                const isEditing = editingId === t.id;
                const dotClass = priorityClass(t.priority);

                return '<div class="todo-item' + (t.done ? ' done' : '') + '" id="item-' + t.id + '">'
                    + '<div class="priority-dot ' + dotClass + '"></div>'
                    + '<div style="flex:1;min-width:0">'
                    + (isEditing
                        ? '<textarea id="edit-' + t.id + '" class="todo-text" rows="2" style="width:100%;resize:vertical;border:1.5px solid var(--blue);border-radius:var(--r-sm);padding:4px 6px;background:var(--surface2)" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();saveEdit(\'' + t.id + '\')}if(event.key===\'Escape\')cancelEdit()">' + escHtml(t.text) + '</textarea>'
                        + '<div style="display:flex;gap:6px;margin-top:6px">'
                        + '<button class="btn btn-teal" style="font-size:0.72rem;padding:3px 10px" onclick="saveEdit(\'' + t.id + '\')">Save</button>'
                        + '<button class="btn btn-ghost" style="font-size:0.72rem;padding:3px 10px" onclick="cancelEdit()">Cancel</button>'
                        + '</div>'
                        : '<span class="todo-text" style="display:block">' + escHtml(t.text) + '</span>'
                    )
                    + '</div>'
                    + (t.tag && !isEditing ? '<span class="tag-badge">' + escHtml(t.tag) + '</span>' : '')
                    + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'
                    + '<span class="todo-meta">' + fmtDate(t.created) + (t.date ? ' · 📅 ' + t.date : '') + '</span>'
                    + (!isEditing
                        ? '<div class="todo-actions">'
                        + '<button class="edit-btn" onclick="startEdit(\'' + t.id + '\')">edit</button>'
                        + '<button class="done-btn" onclick="toggleDone(\'' + t.id + '\')">mark as done</button>'
                        + '<button onclick="removeTodo(\'' + t.id + '\')">remove</button>'
                        + '</div>'
                        : '')
                    + '</div>'
                    + '</div>';
            }).join('');
        }

        load();
        render();
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>

</html>
