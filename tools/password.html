<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="DevBox — Generate strong, cryptographically random passwords">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — DevBox</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<meta property="og:title" content="Password Generator — DevBox">
<meta property="og:description" content="Generate strong, cryptographically random passwords">
<meta property="og:type" content="website">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="content" style="min-width:0">
    <div class="tool-header">
      <div class="tool-icon" style="background:var(--pink-dim);color:var(--pink)">🔑</div>
      <div>
        <div class="tool-title">Password Generator</div>
        <div class="tool-desc">Generate strong, cryptographically random passwords</div>
      </div>
    </div>
    
  <div class="panel">
    <div class="panel-bar"><span class="panel-label">Options</span></div>
    <div class="input-row">
      <label>Length: <span id="pwLenDisplay" style="color:var(--pink)">20</span></label>
      <input type="range" id="pwLen" min="6" max="128" value="20" oninput="pwUpdate()">
    </div>
    <div style="padding:10px 16px 14px;display:flex;flex-wrap:wrap;gap:16px;">
      <label class="check-row"><input type="checkbox" id="pwUpper" checked onchange="pwUpdate()"> Uppercase A–Z</label>
      <label class="check-row"><input type="checkbox" id="pwLower" checked onchange="pwUpdate()"> Lowercase a–z</label>
      <label class="check-row"><input type="checkbox" id="pwNumbers" checked onchange="pwUpdate()"> Numbers 0–9</label>
      <label class="check-row"><input type="checkbox" id="pwSymbols" onchange="pwUpdate()"> Symbols !@#$…</label>
      <label class="check-row"><input type="checkbox" id="pwAmbig" onchange="pwUpdate()"> Exclude ambiguous (0,O,l,1)</label>
    </div>
  </div>
  <div class="panel">
    <div class="panel-bar">
      <span class="panel-label">Password</span>
      <div class="panel-actions">
        <button class="btn btn-pink" onclick="pwGenerate()">⟳ Regenerate</button>
        <button class="btn btn-ghost" onclick="copy(document.getElementById('pwOutput').textContent)">⎘ Copy</button>
      </div>
    </div>
    <div id="pwOutput" class="output-area" style="color:var(--pink);font-size:1rem;letter-spacing:0.06em;word-break:break-all;min-height:60px;"></div>
    <div style="padding:0 16px 14px;">
      <div style="font-size:0.68rem;font-family:var(--mono);color:var(--text-dim);margin-bottom:5px;" id="pwStrengthLabel">Strength: —</div>
      <div class="pw-meter"><div class="pw-seg" id="ps0"></div><div class="pw-seg" id="ps1"></div><div class="pw-seg" id="ps2"></div><div class="pw-seg" id="ps3"></div></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-bar">
      <span class="panel-label">Batch — 5 passwords</span>
      <div class="panel-actions">
        <button class="btn btn-ghost" onclick="pwBatch()">Generate 5</button>
        <button class="btn btn-ghost" onclick="pwCopyBatch()">⎘ Copy all</button>
      </div>
    </div>
    <div id="pwBatchList" class="uuid-list" style="color:var(--pink)"></div>
  </div>
  
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="../assets/shared.js"></script>
<script src="../assets/sidebar.js"></script>
<script>
const UPPER='ABCDEFGHIJKLMNOPQRSTUVWXYZ',LOWER='abcdefghijklmnopqrstuvwxyz',DIGITS='0123456789',SYMBOLS='!@#$%^&*()-_=+[]{}|;:,.<>?';
function buildCharset(){let c='';if(document.getElementById('pwUpper').checked)c+=UPPER;if(document.getElementById('pwLower').checked)c+=LOWER;if(document.getElementById('pwNumbers').checked)c+=DIGITS;if(document.getElementById('pwSymbols').checked)c+=SYMBOLS;if(document.getElementById('pwAmbig').checked)c=c.replace(/[0Ol1I]/g,'');return c||LOWER;}
function genPw(){const len=parseInt(document.getElementById('pwLen').value),cs=buildCharset(),arr=new Uint32Array(len);crypto.getRandomValues(arr);return Array.from(arr,n=>cs[n%cs.length]).join('');}
function pwStrength(pw){let s=0;if(pw.length>=12)s++;if(pw.length>=20)s++;if(/[A-Z]/.test(pw))s++;if(/[a-z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;return Math.min(4,Math.floor(s*4/6));}
function pwUpdate(){document.getElementById('pwLenDisplay').textContent=document.getElementById('pwLen').value;pwGenerate();}
function pwGenerate(){const pw=genPw();document.getElementById('pwOutput').textContent=pw;const s=pwStrength(pw);const colors=['var(--red)','var(--orange)','var(--yellow)','var(--green)'];const labels=['Weak','Fair','Strong','Very strong'];document.getElementById('pwStrengthLabel').textContent='Strength: '+labels[s];for(let i=0;i<4;i++)document.getElementById('ps'+i).style.background=i<=s?colors[s]:'var(--border2)';}
function pwBatch(){const list=document.getElementById('pwBatchList');list.innerHTML='';for(let i=0;i<5;i++){const pw=genPw();const row=document.createElement('div');row.className='uuid-row';row.innerHTML=`<span style="color:var(--pink)">${pw}</span><button class="uuid-copy" onclick="copy(${JSON.stringify(pw)})">⎘</button>`;list.appendChild(row);}}
function pwCopyBatch(){copy([...document.querySelectorAll('#pwBatchList .uuid-row span')].map(s=>s.textContent).join('\n'));}
document.addEventListener('DOMContentLoaded',pwGenerate);
</script>
</body>
</html>
