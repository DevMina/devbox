    <script>
        function uuidV4() {
            // Prefer the browser's native, cryptographically secure UUID generator.
            if (window.crypto && typeof crypto.randomUUID === 'function') return crypto.randomUUID();
            // Fallback for older browsers: same v4 template, but seeded from
            // crypto.getRandomValues() instead of Math.random() (which is not a
            // CSPRNG and shouldn't be relied on for anything unpredictability-sensitive).
            const bytes = new Uint8Array(16);
            crypto.getRandomValues(bytes);
            bytes[6] = (bytes[6] & 0x0f) | 0x40; // version 4
            bytes[8] = (bytes[8] & 0x3f) | 0x80; // variant 10xx
            const hex = [...bytes].map(b => b.toString(16).padStart(2, '0'));
            return `${hex.slice(0,4).join('')}-${hex.slice(4,6).join('')}-${hex.slice(6,8).join('')}-${hex.slice(8,10).join('')}-${hex.slice(10,16).join('')}`;
        }
        function uuidGenerate() { const n = Math.max(1, Math.min(50, parseInt(document.getElementById('uuidCount').value) || 5)); const list = document.getElementById('uuidList'); list.innerHTML = ''; for (let i = 0; i < n; i++) { const id = uuidV4(); const row = document.createElement('div'); row.className = 'uuid-row'; row.innerHTML = `<span>${id}</span><button class="uuid-copy" onclick="copy('${id}')">⎘</button>`; list.appendChild(row); } }
        function uuidCopyAll() { const ids = [...document.querySelectorAll('.uuid-row span')].map(s => s.textContent).join('\n'); copy(ids); }
        document.addEventListener('DOMContentLoaded', uuidGenerate);
    </script>
