<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>(function () { var k = 'devbox_theme'; var stored = null; try { stored = localStorage.getItem(k); } catch (e) {} var t = stored || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'); document.documentElement.setAttribute('data-theme', t); function updateThemeColor(th) { var meta = document.querySelector('meta[name="theme-color"]'); if (meta) meta.setAttribute('content', th === 'light' ? '#F5F7FA' : '#0A0C10'); } function a(th) { document.documentElement.setAttribute('data-theme', th); try { localStorage.setItem(k, th); } catch (e) {} updateThemeColor(th); document.querySelectorAll('.theme-toggle').forEach(function (b) { var i = b.querySelector('.theme-toggle-icon'), l = b.querySelector('.theme-toggle-label'); if (i) i.textContent = th === 'light' ? '🌙' : '☀️'; if (l) l.textContent = th === 'light' ? 'Dark mode' : 'Light mode'; }); } window.toggleTheme = function () { a(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }; window.applyTheme = a; updateThemeColor(t); })();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DevBox — Visual CSS Grid layout generator">
    <title>CSS Grid Generator — DevBox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"></noscript>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16.png">
    <link rel="apple-touch-icon" href="../assets/icon-192.png">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0A0C10">
    <style>
        .grid-layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; }
        @media(max-width:750px) { .grid-layout { grid-template-columns: 1fr; } }
        .ctrl-section { margin-bottom: 14px; }
        .ctrl-section-title { font-size: 0.68rem; font-family: var(--mono); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
        .ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .ctrl-row label { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); width: 80px; flex-shrink: 0; }
        .ctrl-row input[type=range] { flex: 1; accent-color: var(--green); }
        .ctrl-row .val { font-family: var(--mono); font-size: 0.72rem; color: var(--text); width: 24px; text-align: right; }
        .track-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
        .track-item { display: flex; align-items: center; gap: 6px; }
        .track-item input[type=text] { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 0.78rem; padding: 4px 8px; border-radius: 4px; }
        .track-item input[type=text]:focus { outline: none; border-color: var(--green); }
        .track-item .track-lbl { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); width: 20px; text-align: right; }
        .track-del { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; padding: 2px 4px; }
        .track-del:hover { color: var(--red); }
        .add-track-btn { background: none; border: 1px dashed var(--border); color: var(--text-dim); font-family: var(--mono); font-size: 0.72rem; padding: 4px 10px; border-radius: 4px; cursor: pointer; width: 100%; transition: all 0.15s; }
        .add-track-btn:hover { border-color: var(--green); color: var(--green); }
        .preview-area {
            background: repeating-conic-gradient(var(--surface2) 0% 25%, var(--surface) 0% 50%) 0 0/20px 20px;
            border: 1px solid var(--border); border-radius: var(--r); min-height: 280px; padding: 16px; display: flex; align-items: stretch;
        }
        .grid-preview { width: 100%; }
        .grid-cell {
            background: var(--green-dim); border: 1.5px solid var(--green); border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 0.7rem; color: var(--green); min-height: 50px;
        }
        .output-code { font-family: var(--mono); font-size: 0.8rem; color: var(--green); white-space: pre; overflow-x: auto; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; }
        .btn-opt { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); font-family: var(--mono); font-size: 0.72rem; padding: 4px 10px; border-radius: 4px; cursor: pointer; transition: all var(--transition); }
        .btn-opt:hover { border-color: var(--green); color: var(--green); }
        .btn-opt.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }
    </style>
    <meta property="og:title" content="CSS Grid Generator — DevBox">
    <meta property="og:description" content="Visual CSS grid layout builder with live preview">
    <meta property="og:type" content="website">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content-wrap">
            <div class="content">
                <div class="tool-header">
                    <div class="tool-icon" style="background:var(--green-dim);color:var(--green)">▦</div>
                    <div><div class="tool-title">CSS Grid Generator</div><div class="tool-desc">Visual CSS grid layout builder with live preview</div></div>
                </div>

                <div class="grid-layout">
                    <div>
                        <div class="panel">
                            <div class="panel-bar"><span class="panel-label">Columns</span><button class="btn btn-ghost" style="font-size:0.72rem" onclick="addCol()">+ Add</button></div>
                            <div class="track-list" id="col-tracks"></div>
                        </div>

                        <div class="panel" style="margin-top:12px">
                            <div class="panel-bar"><span class="panel-label">Rows</span><button class="btn btn-ghost" style="font-size:0.72rem" onclick="addRow()">+ Add</button></div>
                            <div class="track-list" id="row-tracks"></div>
                        </div>

                        <div class="panel" style="margin-top:12px">
                            <div class="panel-bar"><span class="panel-label">Settings</span>
                                <button class="share-btn" onclick="cssGridShare()">⎘ Share</button>
                            </div>
                            <div class="ctrl-row">
                                <label>column-gap</label>
                                <input type="range" id="col-gap" min="0" max="40" value="8" oninput="render()">
                                <span class="val" id="col-gap-val">8px</span>
                            </div>
                            <div class="ctrl-row">
                                <label>row-gap</label>
                                <input type="range" id="row-gap" min="0" max="40" value="8" oninput="render()">
                                <span class="val" id="row-gap-val">8px</span>
                            </div>
                            <div class="ctrl-section">
                                <div class="ctrl-section-title">justify-items</div>
                                <div class="btn-group" id="grp-justify-items">
                                    <button class="btn-opt active" data-val="stretch">stretch</button>
                                    <button class="btn-opt" data-val="start">start</button>
                                    <button class="btn-opt" data-val="end">end</button>
                                    <button class="btn-opt" data-val="center">center</button>
                                </div>
                            </div>
                            <div class="ctrl-section" style="margin-top:10px">
                                <div class="ctrl-section-title">align-items</div>
                                <div class="btn-group" id="grp-align-items">
                                    <button class="btn-opt active" data-val="stretch">stretch</button>
                                    <button class="btn-opt" data-val="start">start</button>
                                    <button class="btn-opt" data-val="end">end</button>
                                    <button class="btn-opt" data-val="center">center</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style="display:flex;flex-direction:column;gap:12px">
                        <div class="preview-area">
                            <div class="grid-preview" id="grid-preview"></div>
                        </div>
                        <div class="panel" style="margin:0">
                            <div class="panel-bar">
                                <span class="panel-label">CSS Output</span>
                                <div class="panel-actions">
                                    <button class="btn btn-ghost" onclick="copyCSS()">⎘ Copy</button>
                                    <button class="btn btn-ghost" onclick="resetAll()">Reset</button>
                                </div>
                            </div>
                            <pre class="output-code" id="css-output"></pre>
                        </div>
                    </div>
                </div>
            </div>
            <footer class="site-footer">© 2026 Mina Abdo. All rights reserved.</footer>
        </main>
    </div>
    <div class="toast" id="toast"></div>
    <script src="../assets/shared.js" defer></script>
    <script src="../assets/sidebar.js" defer></script>
    <script>
        let cols = ['1fr', '1fr', '1fr'];
        let rows = ['auto', 'auto'];
        let justifyItems = 'stretch', alignItems = 'stretch';

        function renderTrackList(containerId, tracks, type) {
            const el = document.getElementById(containerId);
            el.innerHTML = tracks.map((t, i) => `
                <div class="track-item">
                    <span class="track-lbl">${i + 1}</span>
                    <input type="text" value="${t}" oninput="updateTrack('${type}', ${i}, this.value)" placeholder="1fr / auto / 200px">
                    <button class="track-del" onclick="delTrack('${type}', ${i})">✕</button>
                </div>
            `).join('');
        }

        function updateTrack(type, i, val) {
            if (type === 'col') cols[i] = val;
            else rows[i] = val;
            render();
        }

        function delTrack(type, i) {
            if (type === 'col') { if (cols.length <= 1) return; cols.splice(i, 1); }
            else { if (rows.length <= 1) return; rows.splice(i, 1); }
            render();
        }

        function addCol() { cols.push('1fr'); render(); }
        function addRow() { rows.push('auto'); render(); }

        document.querySelectorAll('.btn-group').forEach(grp => {
            grp.querySelectorAll('.btn-opt').forEach(btn => {
                btn.addEventListener('click', () => {
                    grp.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (grp.id === 'grp-justify-items') justifyItems = btn.dataset.val;
                    else alignItems = btn.dataset.val;
                    render();
                });
            });
        });

        document.getElementById('col-gap').addEventListener('input', function() {
            document.getElementById('col-gap-val').textContent = this.value + 'px'; render();
        });
        document.getElementById('row-gap').addEventListener('input', function() {
            document.getElementById('row-gap-val').textContent = this.value + 'px'; render();
        });

        function render() {
            renderTrackList('col-tracks', cols, 'col');
            renderTrackList('row-tracks', rows, 'row');

            const colGap = document.getElementById('col-gap').value;
            const rowGap = document.getElementById('row-gap').value;
            const totalCells = cols.length * rows.length;

            const gp = document.getElementById('grid-preview');
            gp.style.display = 'grid';
            gp.style.gridTemplateColumns = cols.join(' ');
            gp.style.gridTemplateRows = rows.join(' ');
            gp.style.columnGap = colGap + 'px';
            gp.style.rowGap = rowGap + 'px';
            gp.style.justifyItems = justifyItems;
            gp.style.alignItems = alignItems;

            gp.innerHTML = Array.from({ length: totalCells }, (_, i) =>
                `<div class="grid-cell">${i + 1}</div>`
            ).join('');

            const css = `.container {\n  display: grid;\n  grid-template-columns: ${cols.join(' ')};\n  grid-template-rows: ${rows.join(' ')};\n  column-gap: ${colGap}px;\n  row-gap: ${rowGap}px;\n  justify-items: ${justifyItems};\n  align-items: ${alignItems};\n}`;
            document.getElementById('css-output').textContent = css;
        }

        function copyCSS() {
            navigator.clipboard.writeText(document.getElementById('css-output').textContent)
                .then(() => showToast('Copied!'));
        }

        function resetAll() {
            cols = ['1fr', '1fr', '1fr']; rows = ['auto', 'auto'];
            justifyItems = 'stretch'; alignItems = 'stretch';
            document.getElementById('col-gap').value = 8; document.getElementById('col-gap-val').textContent = '8px';
            document.getElementById('row-gap').value = 8; document.getElementById('row-gap-val').textContent = '8px';
            document.querySelectorAll('.btn-group').forEach(g => {
                g.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
                g.querySelector('.btn-opt').classList.add('active');
            });
            render();
        }

        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1800); }

        window._toolShortcuts = [
            { desc: 'Add column', keys: ['Ctrl', '.'] },
            { desc: 'Add row', keys: ['Ctrl', ','] },
            { desc: 'Copy CSS', keys: ['Ctrl', 'Shift', 'C'] },
            { desc: 'Reset grid', keys: ['Ctrl', 'Shift', 'X'] },
        ];
        document.addEventListener('keydown', e => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === '.') { e.preventDefault(); addCol(); }
                if (e.key === ',') { e.preventDefault(); addRow(); }
                if (e.shiftKey && e.key === 'C') { e.preventDefault(); copyCSS(); }
                if (e.shiftKey && e.key === 'X') { e.preventDefault(); resetAll(); }
            }
        });

        function cssGridShare() {
            const params = new URLSearchParams();
            params.set('cols', cols.join('|'));
            params.set('rows', rows.join('|'));
            params.set('cg', document.getElementById('col-gap').value);
            params.set('rg', document.getElementById('row-gap').value);
            params.set('ji', justifyItems);
            params.set('ai', alignItems);
            history.replaceState(null, '', '?' + params.toString());
            navigator.clipboard.writeText(location.href).then(() => showToast('🔗 Link copied!'));
        }

        function syncBtnGroupActive() {
            document.querySelectorAll('.btn-group').forEach(grp => {
                const target = grp.id === 'grp-justify-items' ? justifyItems : alignItems;
                grp.querySelectorAll('.btn-opt').forEach(b => b.classList.toggle('active', b.dataset.val === target));
            });
        }

        (function restoreFromURL() {
            const params = new URLSearchParams(location.search);
            const c = params.get('cols'), r = params.get('rows');
            if (c) cols = c.split('|');
            if (r) rows = r.split('|');
            if (params.get('cg')) document.getElementById('col-gap').value = params.get('cg');
            if (params.get('rg')) document.getElementById('row-gap').value = params.get('rg');
            if (params.get('ji')) justifyItems = params.get('ji');
            if (params.get('ai')) alignItems = params.get('ai');
            if (c || r) {
                document.getElementById('col-gap-val').textContent = document.getElementById('col-gap').value + 'px';
                document.getElementById('row-gap-val').textContent = document.getElementById('row-gap').value + 'px';
                syncBtnGroupActive();
            }
        })();

        render();
    </script>
</body>
</html>
