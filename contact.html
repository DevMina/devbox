<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — DevBox</title>
    <meta name="description" content="Get in touch with the DevBox team.">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        .contact-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        .spinner {
            width: 13px; height: 13px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #0A0C10;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="app">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="content-wrap">
            <div class="content">
                <div class="contact-wrap">

                    <div class="contact-hero">
                        <div class="contact-hero-title">Contact <span style="color:var(--green)">Us</span></div>
                        <div class="contact-hero-sub">Have a suggestion, found a bug, or just want to say hello? We'll get back to you directly.</div>
                    </div>

                    <!-- Success state -->
                    <div id="formSuccess" class="form-success">
                        <div class="form-success-icon">✅</div>
                        <div><strong>Message sent!</strong></div>
                        <div style="font-size:0.78rem;opacity:0.75">We received your message and will get back to you soon.</div>
                        <button onclick="resetForm()" style="margin-top:10px;padding:7px 18px;background:var(--green);color:#0A0C10;border:none;border-radius:var(--r-sm);font-family:var(--mono);font-size:0.75rem;font-weight:600;cursor:pointer">Send another</button>
                    </div>

                    <!-- Form -->
                    <div class="contact-form" id="contactForm">

                        <div class="form-group">
                            <label class="form-label" for="contactEmail">Your Email</label>
                            <input class="form-input" type="email" id="contactEmail" placeholder="you@example.com" autocomplete="email">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="contactSubject">Subject</label>
                            <input class="form-input" type="text" id="contactSubject" placeholder="What's this about?">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="contactMessage">Message</label>
                            <textarea class="form-textarea" id="contactMessage" placeholder="Tell us what's on your mind…" style="min-height:160px"></textarea>
                        </div>

                        <div id="formError" style="display:none;padding:10px 14px;background:var(--red-dim);border:1px solid var(--red);border-radius:var(--r);color:var(--red);font-size:0.8rem;font-family:var(--mono)"></div>

                        <button class="contact-submit" id="submitBtn" onclick="sendContactForm()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                            Send Message
                        </button>
                    </div>

                    <div class="contact-divider">or email directly</div>

                    <a class="contact-alt" href="mailto:mina.abdo2030@gmail.com">
                        <span class="contact-alt-icon">✉️</span>
                        <div>
                            <div class="contact-alt-label">Email</div>
                            <div class="contact-alt-value">mina.abdo2030@gmail.com</div>
                        </div>
                    </a>

                </div>
            </div>

            <footer class="site-footer">
                © 2026 Mina Abdo. All rights reserved. &nbsp;·&nbsp;
                <a href="index.html" style="color:var(--text-dim);text-decoration:none;transition:color 0.15s"
                   onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--text-dim)'">Back to tools</a>
            </footer>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="assets/theme.js"></script>
    <script src="assets/shared.js"></script>
    <script src="assets/sidebar.js"></script>
    <script>
        // ─────────────────────────────────────────
        // EMAILJS CONFIG — replace these 3 values
        // after setting up at emailjs.com
        // ─────────────────────────────────────────
        const EMAILJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';
        const EMAILJS_SERVICE_ID  = 'YOUR_SERVICE_ID';
        const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';
        // ─────────────────────────────────────────

        emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

        async function sendContactForm() {
            const email   = document.getElementById('contactEmail').value.trim();
            const subject = document.getElementById('contactSubject').value.trim();
            const message = document.getElementById('contactMessage').value.trim();
            const errEl   = document.getElementById('formError');
            const btn     = document.getElementById('submitBtn');

            errEl.style.display = 'none';
            if (!email || !email.includes('@')) { showErr('Please enter a valid email address.'); return; }
            if (!subject)                        { showErr('Please enter a subject.'); return; }
            if (!message)                        { showErr('Please write a message.'); return; }

            // Loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Sending…';

            try {
                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                    from_email: email,
                    subject:    subject,
                    message:    message,
                    to_email:   'mina.abdo2030@gmail.com',
                });

                document.getElementById('contactForm').style.display = 'none';
                document.getElementById('formSuccess').classList.add('show');

            } catch (err) {
                showErr('Failed to send — please try again or email us directly.');
                console.error('EmailJS error:', err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send Message`;
            }
        }

        function resetForm() {
            document.getElementById('contactEmail').value   = '';
            document.getElementById('contactSubject').value = '';
            document.getElementById('contactMessage').value = '';
            document.getElementById('formError').style.display = 'none';
            document.getElementById('contactForm').style.display = '';
            document.getElementById('formSuccess').classList.remove('show');
        }

        function showErr(msg) {
            const el = document.getElementById('formError');
            el.textContent = '⚠ ' + msg;
            el.style.display = 'block';
        }
</script>
</body>
</html>
